<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 - 나무링크</title>
  <link rel="stylesheet" href="css/style.css">
  <script>if(localStorage.getItem("currentUserRole")==="guardian")location.href="guardian-home.html";</script>
  <script src="js/supabase-client.js"></script>
  <script>window._supaLiveKeys = ['notices'];</script>
  <script src="js/supabase-live.js"></script>
  <style>
    .container { max-width: 960px; }
    .notice-list { display:flex; flex-direction:column; gap:10px; }
    .notice-card { background:white; border:1px solid #e0e0e0; border-radius:10px; padding:14px 18px; cursor:pointer; transition:box-shadow .15s; }
    .notice-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .notice-card.pinned { background:#fffbe6; border-color:#ffd54f; }
    .notice-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
    .cat-tag { padding:2px 9px; font-size:11px; font-weight:bold; border-radius:12px; }
    .cat-event    { background:#ffe0b2; color:#e65100; }
    .cat-new      { background:#c8e6c9; color:#2e7d32; }
    .cat-off      { background:#bbdefb; color:#1565c0; }
    .cat-holiday  { background:#f8bbd0; color:#ad1457; }
    .cat-etc      { background:#e0e0e0; color:#555; }
    .pin-badge { color:#f57c00; font-weight:bold; font-size:12px; }
    .notice-title { font-size:15px; font-weight:bold; color:#333; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .notice-meta { font-size:11px; color:#888; }
    .notice-preview { color:#555; font-size:13px; margin-top:6px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .modal { background:white; border-radius:10px; width:640px; max-width:95vw; max-height:90vh; overflow-y:auto; }
    .modal-head { padding:14px 20px; background:#2e7d32; color:white; display:flex; justify-content:space-between; align-items:center; }
    .modal-head h3 { margin:0; font-size:16px; }
    .modal-body { padding:20px; }
    .form-row { margin-bottom:12px; }
    .form-row label { display:block; font-size:12px; font-weight:bold; color:#555; margin-bottom:4px; }
    .form-row input, .form-row textarea, .form-row select { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; box-sizing:border-box; font-family:inherit; }
    .form-row textarea { min-height:180px; resize:vertical; }
    .form-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
    .btn { padding:8px 16px; border:none; border-radius:6px; font-size:13px; font-weight:bold; cursor:pointer; }
    .btn-primary { background:#2e7d32; color:white; }
    .btn-secondary { background:#e0e0e0; color:#333; }
    .btn-danger { background:#c62828; color:white; }
    .content-block { white-space:pre-wrap; word-break:break-word; font-size:14px; line-height:1.7; color:#333; padding:14px 0; }
    .empty { padding:40px; text-align:center; color:#aaa; }
    .filter-bar { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .filter-btn { padding:6px 12px; border:1px solid #ccc; background:white; border-radius:16px; font-size:12px; cursor:pointer; }
    .filter-btn.active { background:#2e7d32; color:white; border-color:#2e7d32; }
  </style>
</head>
<body>
  <header>
    <h1>🌿 나무링크</h1>
    <span id="userLabel" style="font-size:14px;"></span>
  </header>
  <nav>
    <a href="children.html">아동 관리</a>
    <a href="records.html">치료 기록</a>
    <a href="calendar.html">아동 스케줄</a>
    <a href="payments.html">납부 관리</a>
    <a href="therapists.html">치료사 관리</a>
    <a href="notice.html" class="active">공지사항</a>
    <a href="#" onclick="logout()">로그아웃</a>
  </nav>

  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="page-title">📢 공지사항</div>
      <div id="adminActions" style="display:none;">
        <button class="btn btn-primary" onclick="openEditor()">✏️ 공지 작성</button>
      </div>
    </div>

    <div class="card" style="padding:14px 18px;">
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="all"     onclick="setCatFilter('all')">전체 <span id="cnt_all"></span></button>
        <button class="filter-btn"        data-cat="event"   onclick="setCatFilter('event')">이벤트/행사</button>
        <button class="filter-btn"        data-cat="new"     onclick="setCatFilter('new')">신규 치료사</button>
        <button class="filter-btn"        data-cat="off"     onclick="setCatFilter('off')">치료사 휴무</button>
        <button class="filter-btn"        data-cat="holiday" onclick="setCatFilter('holiday')">공휴일</button>
        <button class="filter-btn"        data-cat="etc"     onclick="setCatFilter('etc')">기타</button>
      </div>
      <div id="noticeList" class="notice-list"></div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div id="detailBg" class="modal-bg" style="display:none;">
    <div class="modal">
      <div class="modal-head">
        <h3 id="detailTitle">공지</h3>
        <button onclick="closeDetail()" style="background:transparent;color:white;border:none;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
          <span id="detailCat" class="cat-tag"></span>
          <span id="detailPin"></span>
          <span id="detailMeta" class="notice-meta"></span>
        </div>
        <div id="detailContent" class="content-block"></div>
        <div id="detailAdminActions" class="form-actions" style="display:none;">
          <button class="btn btn-secondary" onclick="togglePin()"><span id="pinLabel">📌 상단 고정</span></button>
          <button class="btn btn-primary" onclick="editCurrent()">✏️ 수정</button>
          <button class="btn btn-danger"  onclick="deleteCurrent()">🗑 삭제</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 작성/편집 모달 -->
  <div id="editorBg" class="modal-bg" style="display:none;">
    <div class="modal">
      <div class="modal-head">
        <h3 id="editorTitle">공지 작성</h3>
        <button onclick="closeEditor()" style="background:transparent;color:white;border:none;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edId">
        <div class="form-row">
          <label>카테고리</label>
          <select id="edCategory">
            <option value="event">이벤트/행사</option>
            <option value="new">신규 치료사 소개</option>
            <option value="off">치료사 휴무/휴가</option>
            <option value="holiday">공휴일 안내</option>
            <option value="etc">기타</option>
          </select>
        </div>
        <div class="form-row">
          <label>제목</label>
          <input type="text" id="edTitle" placeholder="공지 제목">
        </div>
        <div class="form-row">
          <label>내용</label>
          <textarea id="edContent" placeholder="공지 내용을 입력하세요."></textarea>
        </div>
        <div class="form-row" style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="edPinned" style="width:auto;margin:0;">
          <label for="edPinned" style="margin:0;font-weight:normal;cursor:pointer;">📌 상단 고정</label>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeEditor()">취소</button>
          <button class="btn btn-primary" onclick="saveNotice()">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('currentUser')) location.href = 'index.html';
    const CURRENT_USER = localStorage.getItem('currentUser') || '';
    const ROLE = localStorage.getItem('currentUserRole') || '';
    const IS_ADMIN = (CURRENT_USER === '관리자') || (ROLE === 'admin');
    const IS_STAFF_ROLE = (ROLE === 'staff');
    const CAN_WRITE = IS_ADMIN || IS_STAFF_ROLE;   // 작성·수정 가능
    const CAN_DELETE = IS_ADMIN;                    // 삭제는 관리자만
    document.getElementById('userLabel').textContent = CURRENT_USER + '님';
    if (CAN_WRITE) document.getElementById('adminActions').style.display = 'block';
    function logout() { localStorage.removeItem('currentUser'); location.href = 'index.html'; }

    const CAT_LABEL = {
      event:'이벤트/행사', new:'신규 치료사', off:'치료사 휴무', holiday:'공휴일', etc:'기타',
    };
    const CAT_CLASS = {
      event:'cat-event', new:'cat-new', off:'cat-off', holiday:'cat-holiday', etc:'cat-etc',
    };
    function escapeHtml(s){ return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

    let catFilter = 'all';
    let currentNoticeId = null;

    function getAll() {
      try { return JSON.parse(localStorage.getItem('notices')||'[]'); } catch(e) { return []; }
    }
    function setAll(arr) {
      localStorage.setItem('notices', JSON.stringify(arr));
    }
    function setCatFilter(cat) {
      catFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
      renderList();
    }

    function renderList() {
      const all = getAll();
      const filtered = (catFilter==='all' ? all : all.filter(n => n.category===catFilter));
      // 고정 우선, 그 다음 작성일 최신순
      filtered.sort((a,b) => (Number(!!b.is_pinned)-Number(!!a.is_pinned)) || (b.created_at||'').localeCompare(a.created_at||''));
      document.getElementById('cnt_all').textContent = ' ('+all.length+')';
      const box = document.getElementById('noticeList');
      if (!filtered.length) { box.innerHTML = '<div class="empty">공지가 없습니다.</div>'; return; }
      box.innerHTML = filtered.map(n => {
        const catCls = CAT_CLASS[n.category] || 'cat-etc';
        const catLabel = CAT_LABEL[n.category] || '기타';
        const date = n.created_at ? new Date(n.created_at).toLocaleDateString('ko-KR') : '';
        const preview = escapeHtml((n.content||'').slice(0, 140));
        return `<div class="notice-card ${n.is_pinned?'pinned':''}" onclick="openDetail('${n.id}')">
          <div class="notice-head">
            <span class="cat-tag ${catCls}">${catLabel}</span>
            ${n.is_pinned?'<span class="pin-badge">📌 고정</span>':''}
            <span class="notice-title">${escapeHtml(n.title)}</span>
            <span class="notice-meta">${escapeHtml(n.created_by||'')} · ${date}</span>
          </div>
          <div class="notice-preview">${preview}</div>
        </div>`;
      }).join('');
    }

    function openDetail(id) {
      const n = getAll().find(x => x.id === id);
      if (!n) return;
      currentNoticeId = id;
      document.getElementById('detailTitle').textContent = n.title || '공지';
      const catCls = CAT_CLASS[n.category] || 'cat-etc';
      const catLabel = CAT_LABEL[n.category] || '기타';
      const detailCat = document.getElementById('detailCat');
      detailCat.className = 'cat-tag ' + catCls;
      detailCat.textContent = catLabel;
      document.getElementById('detailPin').innerHTML = n.is_pinned ? '<span class="pin-badge">📌 고정</span>' : '';
      const date = n.created_at ? new Date(n.created_at).toLocaleString('ko-KR') : '';
      document.getElementById('detailMeta').textContent = (n.created_by||'') + ' · ' + date;
      document.getElementById('detailContent').textContent = n.content || '';
      document.getElementById('detailAdminActions').style.display = CAN_WRITE ? 'flex' : 'none';
      // 삭제 버튼은 관리자만
      const delBtn = document.querySelector('#detailAdminActions .btn-danger');
      if (delBtn) delBtn.style.display = CAN_DELETE ? '' : 'none';
      document.getElementById('pinLabel').textContent = n.is_pinned ? '📌 고정 해제' : '📌 상단 고정';
      document.getElementById('detailBg').style.display = 'flex';
    }
    function closeDetail() {
      document.getElementById('detailBg').style.display = 'none';
      currentNoticeId = null;
    }

    function openEditor(id) {
      if (!CAN_WRITE) return;
      document.getElementById('editorTitle').textContent = id ? '공지 수정' : '공지 작성';
      if (id) {
        const n = getAll().find(x => x.id === id);
        if (!n) return;
        document.getElementById('edId').value = n.id;
        document.getElementById('edCategory').value = n.category || 'etc';
        document.getElementById('edTitle').value = n.title || '';
        document.getElementById('edContent').value = n.content || '';
        document.getElementById('edPinned').checked = !!n.is_pinned;
      } else {
        document.getElementById('edId').value = '';
        document.getElementById('edCategory').value = 'event';
        document.getElementById('edTitle').value = '';
        document.getElementById('edContent').value = '';
        document.getElementById('edPinned').checked = false;
      }
      document.getElementById('editorBg').style.display = 'flex';
    }
    function closeEditor() { document.getElementById('editorBg').style.display = 'none'; }
    function editCurrent() { const id = currentNoticeId; closeDetail(); openEditor(id); }

    async function saveNotice() {
      const id = document.getElementById('edId').value || ('notice_' + Date.now() + '_' + Math.random().toString(36).slice(2,7));
      const title = document.getElementById('edTitle').value.trim();
      const content = document.getElementById('edContent').value.trim();
      if (!title) { alert('제목을 입력하세요.'); return; }
      if (!content) { alert('내용을 입력하세요.'); return; }
      const all = getAll();
      const idx = all.findIndex(x => x.id === id);
      const now = new Date().toISOString();
      const n = {
        id,
        title,
        content,
        category: document.getElementById('edCategory').value,
        is_pinned: document.getElementById('edPinned').checked,
        created_by: idx >= 0 ? (all[idx].created_by || CURRENT_USER) : CURRENT_USER,
        created_at: idx >= 0 ? (all[idx].created_at || now) : now,
        updated_at: now,
      };
      if (idx >= 0) all[idx] = n; else all.push(n);
      setAll(all);
      await syncPush();
      closeEditor();
      renderList();
    }

    async function togglePin() {
      if (!CAN_WRITE || !currentNoticeId) return;
      const all = getAll();
      const idx = all.findIndex(x => x.id === currentNoticeId);
      if (idx < 0) return;
      all[idx].is_pinned = !all[idx].is_pinned;
      all[idx].updated_at = new Date().toISOString();
      setAll(all);
      await syncPush();
      openDetail(currentNoticeId);
      renderList();
    }

    async function deleteCurrent() {
      if (!CAN_DELETE || !currentNoticeId) return;
      if (!confirm('이 공지를 삭제하시겠습니까?')) return;
      const id = currentNoticeId;
      const all = getAll().filter(x => x.id !== id);
      setAll(all);
      try {
        if (window.Supa) await window.Supa.deleteKey('notices', [id]);
      } catch (e) { console.warn('Supabase 삭제 실패', e); }
      closeDetail();
      renderList();
    }

    async function syncPush() {
      try {
        if (window.Supa) await window.Supa.pushKey('notices');
      } catch (e) { console.warn('Supabase push 실패', e); }
    }
    async function syncPull() {
      try {
        if (!window.Supa) return;
        await window.Supa.pullKey('notices');
      } catch (e) { console.warn('Supabase pull 실패', e); }
    }

    (async () => {
      await syncPull();
      renderList();
    })();
  </script>
</body>
</html>
