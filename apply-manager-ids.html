function normBirth(b){ return (b||'').replace(/\D/g,'').slice(-6); }
function normName(n){ return (n||'').trim(); }

function match(children){
  const matched = []; const unmatched = []; const collisions = [];
  // 중복 이름 체크용
  const byName = {};
  children.forEach(c => { const k=normName(c.name); (byName[k]=byName[k]||[]).push(c); });

  for (const [nm, by, mid] of LIST){
    const targetName = normName(nm);
    const targetBirth = normBirth(by);
    const cands = byName[targetName] || [];
    // 1순위: 이름+생년 일치
    let hit = cands.find(c => normBirth(c.birth) === targetBirth);
    // 2순위: 이름만 일치 (생년 비어있거나 다르면)
    if (!hit && cands.length === 1) hit = cands[0];
    if (!hit && cands.length > 1) {
      collisions.push({name:nm, birth:by, mid, count:cands.length});
      continue;
    }
    if (hit) matched.push({child:hit, mid, name:nm, birth:by});
    else unmatched.push({name:nm, birth:by, mid});
  }
  return {matched, unmatched, collisions};
}

function render(r, applied){
  const html = [];
  html.push(`<h3>${applied?'<span class="ok">✅ 적용 완료</span>':'미리보기'}</h3>`);
  html.push(`<p><span class="ok">매칭: ${r.matched.length}</span> · <span class="warn">미매칭: ${r.unmatched.length}</span> · <span class="err">충돌(동명이인): ${r.collisions.length}</span></p>`);

  if (r.matched.length){
    html.push(`<h4>✅ 매칭된 아동 (${r.matched.length})</h4><table><tr><th>이름</th><th>생년</th><th>관리자번호</th><th>기존번호</th></tr>`);
    r.matched.forEach(m => {
      html.push(`<tr><td>${m.name}</td><td>${m.birth}</td><td><b>${m.mid}</b></td><td>${m.child.managerId||'-'}</td></tr>`);
    });
    html.push(`</table>`);
  }
  if (r.unmatched.length){
    html.push(`<h4 class="warn">⚠ 미매칭 — children에 없는 이름 (${r.unmatched.length})</h4><table><tr><th>이름</th><th>생년</th><th>번호</th></tr>`);
    r.unmatched.forEach(u => html.push(`<tr><td>${u.name}</td><td>${u.birth}</td><td>${u.mid}</td></tr>`));
    html.push(`</table>`);
  }
  if (r.collisions.length){
    html.push(`<h4 class="err">⚠ 동명이인 충돌 (${r.collisions.length}) — 생년 불일치로 자동 매칭 불가</h4><table><tr><th>이름</th><th>생년</th><th>번호</th><th>중복수</th></tr>`);
    r.collisions.forEach(c => html.push(`<tr><td>${c.name}</td><td>${c.birth}</td><td>${c.mid}</td><td>${c.count}</td></tr>`));
    html.push(`</table>`);
  }
  document.getElementById('result').innerHTML = html.join('');
}

function preview(){
  const children = JSON.parse(localStorage.getItem('children') || '[]');
  render(match(children), false);
}
function apply(){
  if (!confirm('localStorage의 children 데이터에 관리자번호를 적용합니다. 진행할까요?')) return;
  const children = JSON.parse(localStorage.getItem('children') || '[]');
  const r = match(children);
  r.matched.forEach(m => { m.child.managerId = m.mid; });
  localStorage.setItem('children', JSON.stringify(children));
  render(r, true);
}
</script>
