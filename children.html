<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아동 관리 - 나무링크</title>
  <link rel="stylesheet" href="css/style.css"><script>if(localStorage.getItem("currentUserRole")==="guardian")location.href="guardian-home.html";</script>
  <style>
    .child-card { background:#fff; border:1px solid #e0e0e0; border-radius:10px; margin-bottom:14px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .child-header { display:flex; align-items:center; gap:12px; padding:12px 16px; background:#f5f9f0; border-bottom:1px solid #e0e0e0; }
    .child-name { font-size:15px; font-weight:bold; color:#2e7d32; }
    .child-birth { font-size:12px; color:#777; }
    .child-age  { font-size:11px; color:#aaa; }
    .status-dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:4px; }
    .status-label { font-size:12px; color:#555; }
    .therapy-table { width:100%; border-collapse:collapse; font-size:13px; }
    .therapy-table th { background:#f9fbe7; color:#558b2f; font-size:11px; font-weight:bold; padding:7px 10px; text-align:center; border-bottom:1px solid #e8f5e9; }
    .therapy-table td { padding:8px 10px; border-bottom:1px solid #f0f0f0; vertical-align:middle; text-align:center; }
    .therapy-table tr:last-child td { border-bottom:none; }
    .support-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:bold; }
    .badge-bandal  { background:#e3f2fd; color:#1565c0; }
    .badge-center  { background:#fff9c4; color:#f57f17; }
    .badge-banchi  { background:#f3e5f5; color:#6a1b9a; }
    .fee-type-badge { display:inline-block; padding:2px 7px; border-radius:8px; font-size:11px; font-weight:bold; background:#e8f5e9; color:#2e7d32; }
    .monthly-fee-grid { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
    .mf-cell { font-size:10px; background:#f5f5f5; border-radius:3px; padding:2px 5px; color:#555; }
    .mf-cell.paid { background:#e8f5e9; color:#2e7d32; }
    .no-therapy { text-align:center; color:#bbb; font-size:13px; padding:14px; }
    .search-wrap { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
    .search-wrap input { flex:1; padding:9px 12px; border:1px solid #ddd; border-radius:6px; font-size:14px; }
    .filter-btn { padding:7px 14px; border:1px solid #c8e6c9; border-radius:6px; font-size:12px; background:#f5f9f0; color:#2e7d32; cursor:pointer; font-weight:bold; }
    .filter-btn.active { background:#2e7d32; color:white; border-color:#2e7d32; }
    .filter-btn .cnt { display:inline-block; margin-left:4px; padding:1px 7px; border-radius:10px; background:rgba(255,255,255,0.5); color:#2e7d32; font-size:11px; font-weight:bold; }
    .filter-btn.active .cnt { background:rgba(255,255,255,0.25); color:white; }
    .section-label { font-size:10px; color:#aaa; display:block; margin-bottom:1px; }
  </style>
  <script src="js/supabase-client.js"></script>
</head>
<body>
  <header>
    <h1>🌿 나무링크</h1>
    <span id="userLabel" style="font-size:14px;"></span>
  </header>
  <nav>
    <a href="children.html" class="active">아동 관리</a>
    <a href="records.html">치료 기록</a>
    <a href="calendar.html">아동 스케줄</a>
    <a href="payments.html">납부 관리</a>
    <a href="therapists.html">치료사 관리</a>

    <a href="change-password.html" id="_pwLink" style="display:none;">🔐 비밀번호</a>
    <a href="#" onclick="logout()">로그아웃</a>
    <script>if(localStorage.getItem('currentUserRole')==='therapist')document.getElementById('_pwLink').style.display='';</script>
  </nav>

  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div class="page-title">아동 관리</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span style="font-size:12px; color:#aaa;">납부현황 기준 자동 표기</span>
        <input type="file" id="_csvFile" accept=".csv,.txt" style="display:none;" onchange="_handleCsvUpload(this.files[0])">
        <a href="supabase-sync.html"><button style="padding:8px 14px;background:#1565c0;color:white;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;">☁️ 클라우드 동기화</button></a>
        <button onclick="document.getElementById('_csvFile').click()" style="padding:8px 14px;background:#e65100;color:white;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;">📥 데이터 일괄 업로드</button>
        <button onclick="openIntakeForm()" style="padding:8px 14px;background:#2e7d32;color:white;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;">+ 신규 상담 등록</button>
      </div>
    </div>

    <div class="card" style="padding:14px 16px;">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="아동 이름 검색..." oninput="renderList()">
        <button class="filter-btn active" id="f_all"      onclick="setFilter('all')">전체 <span class="cnt" id="cnt_all">0</span></button>
        <button class="filter-btn"        id="f_waiting"  onclick="setFilter('waiting')">대기중 <span class="cnt" id="cnt_waiting">0</span></button>
        <button class="filter-btn"        id="f_done"     onclick="setFilter('done')">상담완료 <span class="cnt" id="cnt_done">0</span></button>
        <button class="filter-btn"        id="f_active"   onclick="setFilter('active')">치료중 <span class="cnt" id="cnt_active">0</span></button>

      </div>
      <div id="childList"></div>
    </div>

  <!-- 신규 상담 등록/편집 모달 -->
  <div id="_intakeBg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:10px;width:560px;max-width:92vw;max-height:92vh;overflow-y:auto;">
      <div style="padding:14px 20px;background:#2e7d32;color:white;display:flex;justify-content:space-between;align-items:center;">
        <span id="_intakeTitle" style="font-weight:bold;">신규 상담 등록</span>
        <button onclick="closeIntakeForm()" style="background:transparent;color:white;border:none;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div style="padding:18px 20px;">
        <input type="hidden" id="itId">
        <div style="grid-column:1/3;margin-bottom:10px;padding:8px 12px;background:#f5f9f0;border-left:4px solid #2e7d32;border-radius:5px;display:flex;gap:8px;align-items:center;">
          <label style="font-size:12px;font-weight:bold;color:#2e7d32;min-width:80px;">관리자번호</label>
          <input type="text" id="itManagerId" placeholder="예: 202601자라는059 (신규 등록 시 자동)" style="flex:1;padding:6px 10px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;font-family:monospace;font-size:13px;">
          <button type="button" onclick="_regenManagerId()" style="padding:6px 10px;background:#f5f5f5;color:#333;border:1px solid #ccc;border-radius:5px;font-size:11px;cursor:pointer;" title="현재 데이터 기준으로 다음 번호 자동 채우기">🔄 자동</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div><label style="font-size:12px;font-weight:bold;">이름 *</label><input type="text" id="itName" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">생년월일</label><input type="text" id="itBirth" placeholder="예: 2020.03.15" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">보호자 성함</label><input type="text" id="itGuardian" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">보호자 연락처 *</label><input type="text" id="itPhone" placeholder="010-0000-0000" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">희망 영역</label><input type="text" id="itArea" placeholder="예: 언어치료, 감각통합" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">희망 요일·시간</label><input type="text" id="itPref" placeholder="예: 화요일 4시대" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">문의 첫 날짜</label><input type="date" id="itInquiryDate" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">상담 예정일</label><input type="date" id="itSchedDate" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;"></div>
          <div><label style="font-size:12px;font-weight:bold;">상담 예정 시간</label>
            <div style="display:flex;gap:4px;align-items:center;">
              <select id="itSchedAmPm" style="width:60px;padding:8px 4px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;">
                <option value="">-</option><option value="오전">오전</option><option value="오후">오후</option>
              </select>
              <input type="number" id="itSchedHour" min="1" max="12" placeholder="시" style="width:50px;padding:8px 4px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;text-align:center;">
              <span>:</span>
              <input type="number" id="itSchedMin" min="0" max="59" placeholder="분" style="width:50px;padding:8px 4px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;text-align:center;">
            </div>
          </div>
          <div style="grid-column:1/3;padding-top:10px;border-top:1px dashed #ddd;margin-top:6px;">
            <label style="font-size:13px;font-weight:bold;color:#e65100;">🧡 첫 방문 일정 (선택 · 저장 시 캘린더 · 미납현황 자동 등록)</label>
            <div style="display:flex;gap:14px;margin-top:8px;">
              <label style="cursor:pointer;font-size:13px;padding:6px 12px;border:1.5px solid #fb8c00;border-radius:20px;background:#fff8e1;">
                <input type="checkbox" id="itEnableEval" onchange="_toggleFirstVisit()"> 📋 평가
              </label>
              <label style="cursor:pointer;font-size:13px;padding:6px 12px;border:1.5px solid #7b1fa2;border-radius:20px;background:#f3e5f5;">
                <input type="checkbox" id="itEnableTrial" onchange="_toggleFirstVisit()"> 🎓 1회성 수업 (스타일 확인용)
              </label>
            </div>
          </div>

          <!-- 📋 평가 (다중) -->
          <div id="itEvalWrap" style="grid-column:1/3;display:none;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:13px;font-weight:bold;color:#e65100;">📋 평가 항목</span>
              <button type="button" onclick="_addEvalItem()" style="padding:5px 12px;background:#fb8c00;color:white;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">+ 평가 추가</button>
            </div>
            <div id="itEvalList"></div>
          </div>

          <!-- 🎓 1회성 수업 -->
          <div id="itTrialWrap" style="grid-column:1/3;display:none;background:#f3e5f5;border:1px solid #ce93d8;border-radius:8px;padding:10px 12px;">
            <div style="font-size:13px;font-weight:bold;color:#7b1fa2;margin-bottom:8px;">🎓 1회성 수업</div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
              <div><label style="font-size:11px;">수업 예정일</label><input type="date" id="itTrialDate" style="width:100%;padding:6px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;"></div>
              <div><label style="font-size:11px;">수업 시간</label>
                <div style="display:flex;gap:2px;">
                  <select id="itTrialAmPm" style="width:60px;padding:6px 2px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;">
                    <option value="">-</option><option value="오전">오전</option><option value="오후">오후</option>
                  </select>
                  <input type="number" id="itTrialHour" min="1" max="12" placeholder="시" style="width:50px;padding:6px 2px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;text-align:center;">
                  <span style="align-self:center;">:</span>
                  <input type="number" id="itTrialMin" min="0" max="59" placeholder="분" style="width:50px;padding:6px 2px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;text-align:center;">
                </div>
              </div>
              <div><label style="font-size:11px;">담당 치료사</label>
                <select id="itTrialTherapist" style="width:100%;padding:6px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;">
                  <option value="">선택</option>
                </select>
              </div>
              <div><label style="font-size:11px;">수업 비용 (원)</label>
                <input type="number" id="itTrialFee" min="0" step="1000" placeholder="예: 50000" style="width:100%;padding:6px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;">
              </div>
              <div style="grid-column:1/3;"><label style="font-size:11px;">메모</label>
                <input type="text" id="itTrialNote" placeholder="예: 언어치료 스타일 확인" style="width:100%;padding:6px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;">
              </div>
            </div>
          </div>
          <div><label style="font-size:12px;font-weight:bold;">지원사업 유형</label>
            <select id="itProgram" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;">
              <option value="">선택</option><option>발달재활서비스</option><option>방과후활동비지원</option><option>치료지원</option><option>개인결제</option>
            </select>
          </div>
          <div><label style="font-size:12px;font-weight:bold;">상태</label>
            <select id="itStatus" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;">
              <option>대기중</option><option>상담완료</option><option>보류</option>
            </select>
          </div>
        </div>
        <div style="margin-top:10px;"><label style="font-size:12px;font-weight:bold;">유입 경로</label>
          <select id="itSource" onchange="_toggleSrcEtc()" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;">
            <option value="">선택</option><option>지인소개</option><option>블로그</option><option>인스타그램</option><option>바우처센터 안내</option><option>병원 연계</option><option>기타</option>
          </select>
          <input type="text" id="itSourceEtc" placeholder="직접 입력" style="display:none;width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;margin-top:6px;">
        </div>
        <div style="margin-top:10px;"><label style="font-size:12px;font-weight:bold;">메모</label>
          <textarea id="itNote" placeholder="특이사항·상담 내용 등" style="width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:5px;min-height:70px;"></textarea>
        </div>
        <div style="text-align:right;margin-top:14px;">
          <button id="_intakeDelBtn" onclick="deleteIntake()" style="display:none;padding:7px 14px;background:#c62828;color:white;border:none;border-radius:5px;font-size:13px;font-weight:bold;cursor:pointer;">삭제</button>
          <button onclick="closeIntakeForm()" style="padding:7px 14px;background:#eee;border:none;border-radius:5px;font-size:13px;cursor:pointer;">취소</button>
          <button onclick="saveIntake()" style="padding:7px 14px;background:#2e7d32;color:white;border:none;border-radius:5px;font-size:13px;font-weight:bold;cursor:pointer;">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('currentUser')) location.href = 'index.html';
    document.getElementById('userLabel').textContent = localStorage.getItem('currentUser') + '님';

    let currentFilter = 'all';

    const BANCHI_SUPPORTS = ['방치','방과후활동비','치료지원 언어영역','치료지원 작업치료','방과후 치료지원 언어영역','방과후 치료지원 작업치료'];
    const CENTER_SUPPORT  = '센터비용';
    const BANDAL_SUPPORT  = '발달재활서비스';

    const STATUS_COLOR = { '상담중':'#1565c0','평가중':'#e65100','치료중':'#2e7d32','종결':'#757575','대기중':'#e65100' };
    const FEE_TYPE_LABEL = { '가형':'가형 20,000원','나형':'나형 40,000원','다형':'다형 0원','라형':'라형 60,000원','마형':'마형 80,000원' };

    function getChildren() { return JSON.parse(localStorage.getItem('children')||'[]'); }
    function getPayments() { return JSON.parse(localStorage.getItem('payments')||'[]'); }

    // 6자리 → 8자리 정규화 (00~30 → 20XX, 31~99 → 19XX)
    function normBirth8(birth) {
      const d = String(birth||'').replace(/\D/g,'');
      if (d.length === 8) return d;
      if (d.length === 6) return (parseInt(d.slice(0,2),10) <= 30 ? '20' : '19') + d;
      return '';
    }
    function calcAge(birth) {
      const d = normBirth8(birth);
      if (d.length !== 8) return '';
      const by = parseInt(d.slice(0,4)), bm = parseInt(d.slice(4,6)), bd = parseInt(d.slice(6,8));
      const now = new Date();
      let years = now.getFullYear()-by, months = now.getMonth()+1-bm;
      if (now.getDate()<bd) months--;
      if (months<0){years--;months+=12;}
      if (years<0) return '';
      return years===0 ? `${months}개월` : (months>0?`${years}년 ${months}개월`:`${years}년`);
    }
    // 화면 표시는 항상 YY.MM.DD 6자리
    function fmtBirth(b) {
      const d = normBirth8(b);
      if (d.length !== 8) return b || '-';
      return `${d.slice(2,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
    }

    // 지원유형 정규화 - 저장 시점 통일용 (payments·therapies 모두)
    // 표시상 같은 카테고리인데 문자열이 미묘하게 다른 케이스를 하나로 통일
    function normSupport(s) {
      const v = String(s||'').trim();
      if (!v) return '';
      // 방과후활동/방과후활동비/방과후 활동비 → 방과후활동비
      if (v === '방' || v === '방과후활동' || v === '방과후 활동비' || v === '방과후활동비지원') return '방과후활동비';
      if (v === '센터') return '센터비용';
      // 치료지원 작업치료 계열
      if (v === '치작' || v === '작업치료' || v === '치료지원 작업' || v === '치료지원작업' || v === '치료지원작업치료') return '치료지원 작업치료';
      // 치료지원 언어영역 계열
      if (v === '치언' || v === '언어치료' || v === '언어영역' || v === '치료지원 언어' || v === '치료지원언어' || v === '치료지원언어영역') return '치료지원 언어영역';
      // 방과후 치료지원 계열
      if (v === '방치작' || v === '방과후 치료지원 작업' || v === '방과후치료지원작업치료') return '방과후 치료지원 작업치료';
      if (v === '방치언' || v === '방과후 치료지원 언어' || v === '방과후치료지원언어영역') return '방과후 치료지원 언어영역';
      return v;
    }
    // 매칭용 정규화 - inference 비교 등에서 사용 (normSupport 와 동일하지만 이름으로 의도 명확화)
    function normSupportForMatch(s) { return normSupport(s); }

    function abbrevSupport(s) {
      if (!s) return '-';
      if (s === '발달재활서비스') return '발달재활서비스';
      if (s === '센터비용') return '센터비용';
      if (s === '방과후 치료지원 작업치료') return '방치작';
      if (s === '방과후 치료지원 언어영역') return '방치언';
      if (s === '치료지원 작업치료') return '치작';
      if (s === '치료지원 언어영역') return '치언';
      if (s === '방과후활동비') return '방';
      if (s === '방치') return '방치';
      // 부분 매칭 fallback
      if (s.includes('방과후') && s.includes('작업')) return '방치작';
      if (s.includes('방과후') && s.includes('언어')) return '방치언';
      if (s.includes('작업')) return '치작';
      if (s.includes('언어')) return '치언';
      if (s.includes('방과후활동')) return '방';
      return s;
    }

    function supportBadge(s) {
      if (s===BANDAL_SUPPORT) return `<span class="support-badge badge-bandal">발달재활서비스</span>`;
      if (s===CENTER_SUPPORT)  return `<span class="support-badge badge-center">센터비용</span>`;
      if (BANCHI_SUPPORTS.includes(s)) return `<span class="support-badge badge-banchi">${abbrevSupport(s)}</span>`;
      return `<span class="support-badge" style="background:#f5f5f5;color:#777;">${abbrevSupport(s)}</span>`;
    }

    function fmtCycle(cycle) {
      if (!cycle) return '-';
      return cycle.split(',').map(d=>d.trim()).filter(Boolean).join('·') + '요일';
    }

    function setFilter(f) {
      currentFilter = f;
      ['all','waiting','done','active','end'].forEach(k=>{
        document.getElementById('f_'+k).classList.toggle('active', k===f);
      });
      renderList();
    }

    // 카테고리 판별
    function _catOf(c) {
      const phase = _getPhase(c);
      const st = c.status || (phase==='intake' ? '대기중' : '치료중');
      if (phase === 'intake') {
        if (st === '상담완료') return 'done';
        return 'waiting';       // 대기중·보류 포함
      }
      if (st === '종결') return 'end';
      if (st === '대기중')return 'end';   // 레거시 대기중은 종결/대기 카테고리
      return 'active';           // 치료중 · 그 외
    }
    function _sortWeight(c) {
      const cat = _catOf(c);
      return { waiting:0, done:1, active:2, end:3 }[cat] ?? 4;
    }

    // ===== intake_list → children 일회성 마이그레이션 =====
    function _migrateIntakeIfNeeded() {
      if (localStorage.getItem('_intake_migrated_v1') === '1') return;
      const intake = JSON.parse(localStorage.getItem('intake_list')||'[]');
      if (!intake.length) { localStorage.setItem('_intake_migrated_v1','1'); return; }
      const children = JSON.parse(localStorage.getItem('children')||'[]');
      const existingIntakeIds = new Set(children.filter(c=>c.intakeId).map(c=>c.intakeId));
      let added = 0;
      intake.forEach(it => {
        if (existingIntakeIds.has(it.id)) return;   // 이미 등록확정으로 이관됨
        children.push({
          id: 'ch_int_'+it.id,
          managerId: it.managerId || '',
          name: it.name,
          birth: it.birth || '',
          phone: it.phone || '',
          guardian: it.guardian || '',
          phase: 'intake',
          status: (it.status === '등록확정') ? '치료중' : (it.status || '대기중'),
          intakeId: it.id,
          intakeArea: it.area || '',
          intakePref: it.pref || '',
          intakeSource: it.source || '',
          intakeProgram: it.program || '',
          intakeNote: it.note || '',
          inquiryDate: it.inquiryDate || '',
          schedDate: it.schedDate || '',
          createdAt: it.createdAt || new Date().toISOString(),
          therapies: [],
        });
        // 등록확정 이었으면 phase 를 active 로
        const last = children[children.length-1];
        if (it.status === '등록확정') last.phase = 'active';
        added++;
      });
      if (added) localStorage.setItem('children', JSON.stringify(children));
      localStorage.setItem('_intake_migrated_v1','1');
    }
    _migrateIntakeIfNeeded();

    // therapies 스마트 dedup 마이그레이션 (v1) - 저장 원본 정리
    // 같은 (support+therapist) 는 정보 많은 쪽으로 병합
    try {
      if (!localStorage.getItem('_therapies_dedup_v5')) {
        const cs = JSON.parse(localStorage.getItem('children')||'[]');
        let changed = 0;
        cs.forEach(c => {
          if (!c.therapies || c.therapies.length < 2) return;
          const before = c.therapies.length;
          c.therapies = _dedupTherapies(c.therapies);
          if (c.therapies.length !== before) { c.updatedAt = new Date().toISOString(); changed++; }
        });
        if (changed) {
          localStorage.setItem('children', JSON.stringify(cs));
          console.log(`[therapies dedup v1] ${changed}명의 중복 수업 정리`);
          if (window.Supa && window.Supa.pushKey) window.Supa.pushKey('children').catch(()=>{});
        }
        localStorage.setItem('_therapies_dedup_v5','1');
      }
    } catch(e) { console.warn('therapies dedup migration failed', e); }

    // 아동 status 자동 복구: c.status='대기중' 인데 실제 활성 therapy 있으면 치료중으로
    // (payments 편집 팝업의 과거 버그 잔재 정리)
    try {
      if (!localStorage.getItem('_child_status_repair_v1')) {
        const cs = JSON.parse(localStorage.getItem('children')||'[]');
        let repaired = 0;
        cs.forEach(c => {
          if (c.status !== '대기중') return;
          // 활성 therapy 판정: 종결 아님 · cycle 또는 timeSlot 값 있음
          const hasActive = (c.therapies||[]).some(t => {
            const ended = t.centerEndDate || t.banchiEndDate || t.extraEndDate;
            if (ended && String(ended).slice(0,10) <= new Date().toISOString().slice(0,10)) return false;
            const hasSchedule = (t.cycle||'').trim() || (t.timeSlot||'').trim();
            return hasSchedule;
          });
          if (hasActive) {
            c.status = '치료중';
            c.phase = 'active';
            delete c.endDate;
            // 스케줄 없는 therapy 는 개별 pending 마킹 (이전에 대기 처리했던 항목 복원)
            (c.therapies||[]).forEach(t => {
              const ended = t.centerEndDate || t.banchiEndDate || t.extraEndDate;
              if (ended) return;
              const hasSchedule = (t.cycle||'').trim() || (t.timeSlot||'').trim();
              if (!hasSchedule && (t.therapist||'').trim()) t.pending = true;
            });
            c.updatedAt = new Date().toISOString();
            repaired++;
          }
        });
        if (repaired) {
          localStorage.setItem('children', JSON.stringify(cs));
          console.log(`[status repair v1] ${repaired}명 아동 status 복구 · 활성 therapy 유지 + partial therapy 는 개별 pending 마킹`);
          if (window.Supa && window.Supa.pushKey) window.Supa.pushKey('children').catch(()=>{});
        }
        localStorage.setItem('_child_status_repair_v1','1');
      }
    } catch(e) { console.warn('child status repair failed', e); }

    // 기존 children 에 phase 필드 없으면 'active' 로 간주하는 헬퍼
    function _getPhase(c) { return c.phase || 'active'; }

    // ===== 관리자번호 자동 생성 (자라는나무 센터코드 01) =====
    // 형식: YYYY01자라는NNN (예: 202601자라는059)
    // 규칙:
    //  1) 목표 연도(inquiryDate 의 연도) 에 이미 부여된 번호가 있으면 그 년도 max + 1
    //  2) 목표 연도 첫 등록이면 전체 "자라는" 시리즈의 max + 1 을 연속으로 사용
    //  3) 하이픈·공백은 무시하고 매칭
    const _MID_RE = /^(\d{4})01자라는(\d+)$/;
    function _parseAnyMid(midRaw) {
      const mid = String(midRaw||'').replace(/[\s\-–—_]/g,'');
      const m = mid.match(_MID_RE);
      if (!m) return null;
      const seq = parseInt(m[2], 10);
      return { year: m[1], seq: Number.isFinite(seq) ? seq : 0, mid };
    }
    // "🔄 자동" 버튼: 현재 데이터 기준 다음 번호를 입력창에 채움
    window._regenManagerId = function() {
      const el = document.getElementById('itManagerId');
      const next = _generateManagerId(new Date().toISOString().slice(0,10));
      if (el.value && el.value !== next) {
        if (!confirm(`현재 값: ${el.value}\n자동 계산 값: ${next}\n\n덮어쓸까요?`)) return;
      }
      el.value = next;
    };
    // 아동의 therapies 배열을 (support+therapist) 기준으로 스마트 dedup
    // 같은 (support,therapist) 조합이 여러 개면 cycle/timeSlot 값 있는 쪽 우선
    // 부가 필드는 병합 (baseCount·serviceStartDate 등 값 있는 쪽 채움)
    // 유니코드 불가시 문자 제거 (안전한 \u 이스케이프만 사용)
    // NBSP · ZWSP · ZWNJ · ZWJ · LSEP · PSEP · NNBSP · MMSP · ideographic space · BOM
    function _cleanUnicode(s) {
        // regex 리터럴에 U+2028/2029 를 못 넣으므로 charCode 필터 사용
        const INVIS = { 160:1, 8203:1, 8204:1, 8205:1, 8232:1, 8233:1, 8239:1, 8287:1, 12288:1, 65279:1 };
        let out = "";
        const str = String(s||"");
        for (let i=0;i<str.length;i++) { out += INVIS[str.charCodeAt(i)] ? " " : str[i]; }
        return out.replace(/\s+/g, " ").trim();
    }
    // 아동의 therapies 스마트 dedup
    // 규칙:
    // 1) '실 정보' (cycle 또는 timeSlot 있음) 는 (support+therapist+cycle+timeSlot) 완전 일치일 때만 병합
    //    → 주 2회 같은 담당자 (화·금 등) 는 별도 유지
    // 2) '부분 정보' (cycle·timeSlot 둘 다 빈 항목) 는 같은 (support+therapist) 실 정보에 흡수
    //    → 부분 정보끼리는 support 만 같아도 흡수 후보 (담당자 매칭 우선)
    function _dedupTherapies(list) {
      if (!Array.isArray(list) || list.length < 2) return list;
      const full = [], partial = [];
      list.forEach(t => {
        const hasInfo = ((t.cycle||'').trim() || (t.timeSlot||'').trim());
        if (hasInfo) full.push(t); else partial.push(t);
      });

      // 1) full: 엄격 dedup (support+therapist+cycle+timeSlot)
      const map = new Map();
      full.forEach(t => {
        const support = normSupport(t.support);
        const therapist = _cleanUnicode(t.therapist);
        const cycle = (t.cycle||'').trim();
        const timeSlot = (t.timeSlot||'').trim();
        const key = support + '|' + therapist + '|' + cycle + '|' + timeSlot;
        if (!map.has(key)) { map.set(key, { ...t, support }); return; }
        const existing = map.get(key);
        Object.keys(t).forEach(k => {
          if (existing[k] == null || existing[k] === '') existing[k] = t[k];
          if (typeof t[k] === 'number' && typeof existing[k] === 'number' && t[k] > existing[k]) existing[k] = t[k];
        });
      });
      const fullArr = [...map.values()];

      // 2) partial 항목 흡수: 같은 support 실 정보 있으면 흡수, 없으면 유지
      const kept = [];
      partial.forEach(t => {
        const s = normSupport(t.support);
        const th = _cleanUnicode(t.therapist);
        // 담당자 매칭 우선, 없으면 support 만 매칭
        let target = fullArr.find(c => normSupport(c.support) === s && _cleanUnicode(c.therapist) === th);
        if (!target) target = fullArr.find(c => normSupport(c.support) === s);
        if (target) {
          Object.keys(t).forEach(k => {
            if (target[k] == null || target[k] === '') target[k] = t[k];
            if (typeof t[k] === 'number' && typeof target[k] === 'number' && t[k] > target[k]) target[k] = t[k];
          });
        } else {
          kept.push(t);
        }
      });

      return [...fullArr, ...kept];
    }

    function _generateManagerId(inquiryDate) {
      // 항상 등록 시점의 연도 기준 · 연도 바뀌면 001 부터 다시 시작
      const year = (inquiryDate || new Date().toISOString().slice(0,10)).slice(0,4);
      const children = JSON.parse(localStorage.getItem('children')||'[]');
      let maxThisYear = 0;
      children.forEach(c => {
        const p = _parseAnyMid(c.managerId);
        if (!p || p.year !== year) return;
        if (p.seq > maxThisYear) maxThisYear = p.seq;
      });
      return `${year}01자라는${String(maxThisYear + 1).padStart(3,'0')}`;
    }

      else if (src) { srcSel.value = '기타'; srcEtc.value = src; }

    function closeIntakeForm(){ document.getElementById('_intakeBg').style.display = 'none'; }
    function saveIntake(){
      const name = document.getElementById('itName').value.trim();
      const phone = document.getElementById('itPhone').value.trim();
      if (!name || !phone) { alert('이름과 보호자 연락처는 필수입니다.'); return; }
      const editId = document.getElementById('itId').value;
      const arr = getChildren();
      const srcSel = document.getElementById('itSource').value;
      const srcEtc = document.getElementById('itSourceEtc').value.trim();
      const source = (srcSel==='기타') ? (srcEtc||'기타') : srcSel;
      const inquiryDate = document.getElementById('itInquiryDate').value || new Date().toISOString().slice(0,10);
      let rec;
      if (editId) {
        const idx = arr.findIndex(c=>c.id===editId);
        if (idx<0) return alert('레코드를 찾을 수 없습니다.');
        rec = arr[idx];
      } else {
        rec = {
          id: 'ch_int_itk_'+Date.now(),
          phase: 'intake',
          therapies: [],
          createdAt: new Date().toISOString(),
        };
        arr.push(rec);
      }
      // 관리자번호: 폼 입력값 우선, 없으면 자동 생성 (신규·편집 모두 적용)
      const inputMid = document.getElementById('itManagerId').value.replace(/[\s\-–—_]/g,'').trim();
      rec.managerId = inputMid || rec.managerId || _generateManagerId(inquiryDate);
      rec.name = name;
      rec.phone = phone;
      rec.birth = document.getElementById('itBirth').value.trim();
      rec.guardian = document.getElementById('itGuardian').value.trim();
      rec.intakeArea = document.getElementById('itArea').value.trim();
      rec.intakePref = document.getElementById('itPref').value.trim();
      rec.inquiryDate = inquiryDate;
      rec.schedDate = document.getElementById('itSchedDate').value;
      rec.schedTime = _buildTime12('itSchedAmPm','itSchedHour','itSchedMin');
      // 평가 다중 항목
      if (document.getElementById('itEnableEval').checked) {
        rec.evalItems = (window._pendingEvalItems||[]).filter(it => it.date || it.time || it.therapist || it.area || it.fee);
      } else {
        rec.evalItems = [];
      }
      // 1회성 수업
      if (document.getElementById('itEnableTrial').checked) {
        const trTime = _buildTime12('itTrialAmPm','itTrialHour','itTrialMin');
        rec.trialLesson = {
          date: document.getElementById('itTrialDate').value,
          time: trTime,
          therapist: document.getElementById('itTrialTherapist').value,
          fee: document.getElementById('itTrialFee').value,
          note: document.getElementById('itTrialNote').value.trim(),
        };
      } else {
        rec.trialLesson = null;
      }
      // 레거시 단일 필드 정리
      delete rec.evalDate; delete rec.evalTime; delete rec.evalTherapist; delete rec.evalNote; delete rec.evalArea; delete rec.evalFee;
      _syncAssessmentEvent(rec);
      rec.intakeProgram = document.getElementById('itProgram').value;
      rec.status = document.getElementById('itStatus').value;
      rec.intakeSource = source;
      rec.intakeNote = document.getElementById('itNote').value.trim();

      closeIntakeForm();

    // ===== 12시간제 시간 파싱/조합 =====
    // 저장 형식: "오전 9:30" · "오후 5:40" · 빈 문자열
    function _parseTime12(str, ampmId, hourId, minId) {
      const ampmEl = document.getElementById(ampmId);
      const hourEl = document.getElementById(hourId);
      const minEl  = document.getElementById(minId);
      if (!ampmEl || !hourEl || !minEl) return;
      ampmEl.value = ''; hourEl.value = ''; minEl.value = '';
      if (!str) return;
      const s = String(str).trim();
      // "오후 5:40" · "오전 9:30" 형식
      let m = s.match(/^(오전|오후)\s*(\d{1,2}):(\d{1,2})$/);
      if (m) { ampmEl.value = m[1]; hourEl.value = m[2]; minEl.value = String(parseInt(m[3],10)).padStart(2,'0'); return; }
      // 레거시 24시간 "17:40" 형식 → 자동 변환
      m = s.match(/^(\d{1,2}):(\d{1,2})$/);
      if (m) {
        let h = parseInt(m[1],10), mm = parseInt(m[2],10);
        const ampm = h < 12 ? '오전' : '오후';
        h = h % 12; if (h === 0) h = 12;
        ampmEl.value = ampm; hourEl.value = String(h); minEl.value = String(mm).padStart(2,'0');
      }
    }
    function _buildTime12(ampmId, hourId, minId) {
      const ampm = document.getElementById(ampmId).value;
      const hour = document.getElementById(hourId).value;
      const min  = document.getElementById(minId).value;
      if (!ampm && !hour) return '';
      if (!ampm || !hour) return '';
      const h = parseInt(hour,10);
      const m = parseInt(min||'0',10);
      if (!Number.isFinite(h) || h < 1 || h > 12) return '';
      if (!Number.isFinite(m) || m < 0 || m > 59) return '';
      return `${ampm} ${h}:${String(m).padStart(2,'0')}`;
    }

    // ===== 첫 방문 일정: 평가 다중 · 1회성 수업 =====
    const EVAL_AREAS = ['언어평가','발달평가','감각평가','인지평가','기타'];

                <span style="align-self:center;">:</span>
                <input type="number" data-ev="mm" data-idx="${idx}" min="0" max="59" value="${mm}" onchange="_updateEvalField(this)" placeholder="분" style="width:44px;padding:5px 2px;box-sizing:border-box;border:1px solid #ccc;border-radius:4px;text-align:center;">

    window._updateEvalField = function(el) {
      const idx = parseInt(el.dataset.idx, 10);
      const field = el.dataset.ev;
      const it = window._pendingEvalItems[idx]; if (!it) return;
      if (field === 'ampm' || field === 'hh' || field === 'mm') {
        // 시간 필드는 조합 저장
        const row = el.closest('div');
        const ampm = document.querySelector(`[data-idx="${idx}"][data-ev="ampm"]`).value;
        const hh = document.querySelector(`[data-idx="${idx}"][data-ev="hh"]`).value;
        const mm = document.querySelector(`[data-idx="${idx}"][data-ev="mm"]`).value;
        if (ampm && hh) {
          const m = parseInt(mm||'0',10);
          it.time = `${ampm} ${parseInt(hh,10)}:${String(m).padStart(2,'0')}`;
        } else it.time = '';
      } else {
        it[field] = el.value;
      }
    };

    // ===== 첫 방문 일정 → assessment_events + payments 자동 동기화 =====
    // 이벤트 id 형식:
    //   평가:      ev_{childId}_e{index}
    //   1회성수업: ev_{childId}_trial
    // 저장 시 이 childId 로 시작하는 기존 이벤트를 모두 정리 후 새로 삽입
    function _syncAssessmentEvent(rec) {
      const events = JSON.parse(localStorage.getItem('assessment_events')||'[]');
      const payments = JSON.parse(localStorage.getItem('payments')||'[]');
      const now = new Date().toISOString();
      const evPrefix = 'ev_' + rec.id;
      const pyPrefix = 'py_intake_' + rec.id;
      // 1) 이 rec 관련 기존 이벤트/납부 항목 모두 제거 (재생성)
      const evKeep = events.filter(e => !e.id || !e.id.startsWith(evPrefix));
      const pyKeep = payments.filter(p => !p.id || !p.id.startsWith(pyPrefix));

      // 2) 평가 항목 추가
      const evalItems = Array.isArray(rec.evalItems) ? rec.evalItems : [];
      evalItems.forEach((it, idx) => {
        if (!it.date && !it.time && !it.therapist && !it.area) return;
        evKeep.push({
          id: `${evPrefix}_e${idx}`,
          kind: 'assessment',
          childId: rec.id,
          childName: rec.name,
          childBirth: rec.birth,
          managerId: rec.managerId||'',
          area: it.area||'',
          date: it.date||'',
          time: it.time||'',
          therapist: it.therapist||'',
          fee: it.fee||'',
          note: it.note||'',
          updatedAt: now,
        });
        const feeNum = parseInt(it.fee||'0', 10);
        if (feeNum > 0 && it.date) {
          const monthKey = it.date.slice(0,7);   // YYYY-MM
          pyKeep.push({
            id: `${pyPrefix}_e${idx}`,
            childId: rec.id,
            childName: rec.name||'',
            support: `평가 (${it.area||'미분류'})`,
            monthKey,
            amount: feeNum,
            basePaid: false,
            baseDepositDate: '',
            cardApproval: '',
            source: 'intake_eval',
            note: it.note||'',
            createdAt: now,
          });
        }
      });

      // 3) 1회성 수업 추가
      const tr = rec.trialLesson;
      if (tr && (tr.date || tr.time || tr.therapist)) {
        evKeep.push({
          id: `${evPrefix}_trial`,
          kind: 'trial_lesson',
          childId: rec.id,
          childName: rec.name,
          childBirth: rec.birth,
          managerId: rec.managerId||'',
          date: tr.date||'',
          time: tr.time||'',
          therapist: tr.therapist||'',
          fee: tr.fee||'',
          note: tr.note||'',
          updatedAt: now,
        });
        const feeNum = parseInt(tr.fee||'0', 10);
        if (feeNum > 0 && tr.date) {
          pyKeep.push({
            id: `${pyPrefix}_trial`,
            childId: rec.id,
            childName: rec.name||'',
            support: '1회성 수업',
            monthKey: tr.date.slice(0,7),
            amount: feeNum,
            basePaid: false,
            baseDepositDate: '',
            cardApproval: '',
            source: 'intake_trial',
            note: tr.note||'',
            createdAt: now,
          });
        }
      }

      localStorage.setItem('assessment_events', JSON.stringify(evKeep));
      localStorage.setItem('payments', JSON.stringify(pyKeep));
      // 캘린더·납부 페이지에서 즉시 볼 수 있도록 즉시 push (debounce 우회)
      if (window.Supa && typeof window.Supa.pushKey === 'function') {
        window.Supa.pushKey('assessment_events').catch(err => console.warn('assessment_events push failed', err));
        window.Supa.pushKey('payments').catch(err => console.warn('payments push failed', err));
      }
    }

    function deleteIntake(){

      if (!editId) return;
      if (!confirm('이 상담 기록을 삭제하시겠습니까?\n연동된 평가·1회성 수업 일정과 미납 항목도 함께 삭제됩니다.')) return;
      const arr = getChildren().filter(c=>c.id!==editId);
      localStorage.setItem('children', JSON.stringify(arr));
      // 연동된 평가·1회성 수업 이벤트 (ev_{childId}_로 시작) 함께 삭제
      const evPrefix = 'ev_' + editId;
      const events = JSON.parse(localStorage.getItem('assessment_events')||'[]')
        .filter(e => !e.id || (!e.id.startsWith(evPrefix) && e.id !== 'ev_'+editId));
      localStorage.setItem('assessment_events', JSON.stringify(events));
      // 연동된 미납 항목 (py_intake_{childId}_로 시작) 함께 삭제
      const pyPrefix = 'py_intake_' + editId;
      const payments = JSON.parse(localStorage.getItem('payments')||'[]')
        .filter(p => !p.id || !p.id.startsWith(pyPrefix));
      localStorage.setItem('payments', JSON.stringify(payments));
      closeIntakeForm();
      renderList();
    }

    function renderList() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const year  = new Date().getFullYear();
      const payments = getPayments();

      const all = getChildren();
      // 탭별 건수 (검색어 무관)
      const counts = { all: all.length, waiting:0, done:0, active:0, end:0 };
      all.forEach(c => { counts[_catOf(c)] = (counts[_catOf(c)]||0) + 1; });
      Object.keys(counts).forEach(k => {
        const el = document.getElementById('cnt_'+k);
        if (el) el.textContent = counts[k];
      });

      let list = all.filter(c=>(c.name||'').toLowerCase().includes(query));
      if (currentFilter !== 'all') list = list.filter(c => _catOf(c) === currentFilter);
      // 정렬: 대기중 → 상담완료 → 치료중 → 종결 순
      list.sort((a,b) => {
        const w = _sortWeight(a) - _sortWeight(b);
        if (w !== 0) return w;
        // 같은 카테고리 안: 대기중은 상담예정일 오름차순, 나머지는 이름 오름차순
        const cat = _catOf(a);
        if (cat === 'waiting' || cat === 'done') {
          return (a.schedDate||'9999') > (b.schedDate||'9999') ? 1 : -1;
        }
        return (a.name||'').localeCompare(b.name||'');
      });

      const container = document.getElementById('childList');
      if (!list.length) { container.innerHTML='<div class="no-therapy">해당하는 아동이 없습니다.</div>'; return; }

      container.innerHTML = list.map(c=>{
        // 신규 상담(intake) 카드는 별도 형식으로 렌더
        if (_getPhase(c) === 'intake') {

          const doneBtn = isDone
            ? `<button onclick="markConsultBackToWaiting('${c.id}')" style="padding:5px 10px;background:#f5f5f5;color:#666;border:1px solid #ddd;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">↩ 대기로</button>`
            : `<button onclick="markConsultDone('${c.id}')" style="padding:5px 10px;background:#1565c0;color:white;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">✔ 상담완료</button>`;
          return `
          <div class="child-card" style="border-left:4px solid ${barColor};">
            <div class="child-header">
              <div>
                <span class="child-name" style="color:${nameColor};">${icon} ${c.name}</span>
                <span class="child-birth" style="margin-left:8px;">${fmtBirth(c.birth)}</span>
                <span class="child-age" style="margin-left:6px;">(${calcAge(c.birth)})</span>
              </div>
              <div>
                <span class="status-dot" style="background:${nameColor};"></span>
                <span class="status-label">${st}</span>
              </div>
              ${c.managerId ? `<div style="font-size:11px;color:#999;">관리자번호: ${c.managerId}</div>` : ''}
              <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
                <button onclick="openIntakeForm('${c.id}')" style="padding:5px 10px;background:#f5f5f5;color:#333;border:1px solid #ddd;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">✏️ 편집</button>
                ${isDone ? `<button onclick="_issueAssessmentLink('${c.id}')" style="padding:5px 10px;background:#fee500;color:#3c1e1e;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">📩 초기상담지 링크</button>` : ''}
                ${doneBtn}
                <button onclick="confirmRegister('${c.id}')" style="padding:5px 10px;background:#2e7d32;color:white;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">✅ 등록확정</button>
              </div>
            </div>
            <div style="padding:10px 16px;font-size:12px;color:#555;background:${bgColor};">
              <span style="margin-right:12px;"><b>보호자:</b> ${c.guardian||'-'} · ${c.phone||'-'}</span>
              <span style="margin-right:12px;"><b>희망영역:</b> ${c.intakeArea||'-'}</span>
              <span style="margin-right:12px;"><b>희망시간:</b> ${c.intakePref||'-'}</span>

            </div>

        }
        const st    = c.status||'치료중';
        const color = STATUS_COLOR[st]||'#2e7d32';
        const therapies = _dedupTherapies(c.therapies||[]);

        // 납부이력에서 감지된 지원유형 중 therapies 에 없는 것 추론

        const existingSupports = new Set(therapies.map(t => normSupportForMatch(t.support)).filter(Boolean));
        const paymentsForChild = payments.filter(p => p.childId === c.id);
        // 지원유형·담당·요일·시간·본인부담금 유형 모두 공란이면 카드 자체를 숨김
        // (신규상담 phase='intake' 카드는 위에서 이미 별도 렌더 · 대상 아님)
        const hasAnyTherapyInfo = therapies.some(t =>
          (t.support||'').trim() || (t.therapist||'').trim() ||
          (t.cycle||'').trim() || (t.timeSlot||'').trim()
        );
        const hasAnyPayment = paymentsForChild.some(p => (p.support||'').trim());
        const hasFeeType = !!c.feeType;
        if (!hasAnyTherapyInfo && !hasAnyPayment && !hasFeeType) return '';
        const inferredSupports = [];
        const seenInferred = new Set();
        paymentsForChild.forEach(p => {
          const sup = (p.support||'').trim();
          if (!sup || sup.startsWith('평가') || sup === '1회성 수업') return;   // 첫방문 결제는 별도
          const normed = normSupportForMatch(sup);
          if (existingSupports.has(normed) || seenInferred.has(normed)) return;
          seenInferred.add(normed);
          inferredSupports.push(normed);
        });

        // 지원유형별 rows (인수인계 있으면 2개 행으로 분리: 전임 종결 + 후임 현행)
        const _today = new Date().toISOString().slice(0,10);
        const rows = therapies.flatMap(t=>{
          const isBandal  = t.support===BANDAL_SUPPORT;
          const buildExtraCols = () => {
            if (isBandal) {
              const ftLabel = c.feeType ? `<span class="fee-type-badge">${FEE_TYPE_LABEL[c.feeType]||c.feeType}</span>` : '<span style="color:#bbb;font-size:11px;">-</span>';
              return `<td style="text-align:left;">${ftLabel}</td>`;
            }
            return `<td style="color:#ddd;font-size:11px;">-</td>`;
          };
          const extraCols = buildExtraCols();

          // 인수인계 판정: handoff.date 가 오늘 이전이면 후임에게 인수됨
          // handoff.therapist 가 빈 문자열이면 무시 (빈 handoff 잔재)
          const handoff = t.handoff;
          const handoffActive = handoff && handoff.date && String(handoff.date).slice(0,10) <= _today
                              && (handoff.therapist||'').trim();

          // therapy 종결 여부: endDate 계열이 오늘 이전이면 종결
          const rawEndedDate = [t.centerEndDate, t.banchiEndDate, t.extraEndDate]
            .filter(d => d && String(d).slice(0,10) <= _today)
            .sort()[0];
          // 인수인계도 전임 세션의 '종결' 로 취급 (endDate = handoff.date)
          const originalEndedDate = rawEndedDate || (handoffActive ? handoff.date : null);
          const isOriginalEnded = !!originalEndedDate;
          const endedMark = (d) => `<span style="display:inline-block;background:#757575;color:white;font-size:9px;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:bold;vertical-align:middle;" title="${d} 종결">종결</span>`;

          // 대기중 판정: (t.pending 플래그) OR (종결 아님 · 요일·시간 모두 빈 값 · 담당자 배정됨)
          // t.pending 은 payments 편집 팝업에서 therapy 별 대기 처리 시 마킹
          const isPending = !isOriginalEnded && (
            t.pending === true ||
            (!(t.cycle||'').trim() && !(t.timeSlot||'').trim() && (t.therapist||'').trim())
          );
          const pendingMark = isPending
            ? `<span style="display:inline-block;background:#fb8c00;color:white;font-size:9px;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:bold;vertical-align:middle;" title="담당 배정 · 요일·시간 미정">대기</span>`
            : '';
          const origRow = `<tr style="${isOriginalEnded ? 'opacity:0.55;' : (isPending ? 'background:#fff8e1;' : '')}">
            <td>${supportBadge(t.support)}${isOriginalEnded ? endedMark(originalEndedDate) : pendingMark}</td>
            <td>${t.therapist||c.therapist||'-'}</td>
            <td>${isPending ? '<span style="color:#e65100;">미정</span>' : fmtCycle(t.cycle)}</td>
            <td>${isPending ? '<span style="color:#e65100;">미정</span>' : (t.timeSlot||'-')}</td>
            ${extraCols}
          </tr>`;

          if (!handoffActive) return [origRow];

          // 후임 행: handoff 정보로 대체된 필드
          const successorRow = `<tr style="background:#f5f9ff;">
            <td>${supportBadge(t.support)} <span style="display:inline-block;background:#1565c0;color:white;font-size:9px;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:bold;vertical-align:middle;" title="${handoff.date} 인수인계">인수</span></td>
            <td><b>${handoff.therapist}</b><br><span style="font-size:10px;color:#888;">${t.therapist||'-'} 인수</span></td>
            <td>${fmtCycle(handoff.cycle || t.cycle)}</td>
            <td>${handoff.timeSlot || t.timeSlot || '-'}</td>
            ${extraCols}
          </tr>`;
          return [origRow, successorRow];
        }).join('');

        // 추론된 지원유형 행 판정 (완납 이력 기반)
        // 규칙:
        //  1) 완납 0건 → 실제 진행된 적 없음 → 종결 (미납만 자동 생성된 잔재)
        //  2) 완납 있지만 최근 3개월 내 완납 없음 → 과거 서비스 → 종결
        //  3) 최근 3개월 내 완납 있음 → 진행중이나 수업정보 미등록 → 노란 감지
        const _ymAgo = (m) => { const d = new Date(); d.setMonth(d.getMonth() - m); return d.toISOString().slice(0,7); };
        const _recentCutoff = _ymAgo(3);
        const inferredRows = inferredSupports.map(sup => {
          const supPayments = paymentsForChild.filter(p => normSupportForMatch(p.support) === sup);
          const paidPayments = supPayments.filter(p => p.basePaid || p.extraPaid);
          const paidMonths = paidPayments.map(p => (p.monthKey||'').slice(0,7)).filter(Boolean).sort();
          const latestPaidMk = paidMonths[paidMonths.length - 1] || '';
          const isEnded = paidPayments.length === 0 || (latestPaidMk && latestPaidMk < _recentCutoff);
          if (isEnded) {
            const endReason = paidPayments.length === 0
              ? '완납 이력 없음 (미납 자동 생성만 있음)'
              : `${latestPaidMk} 마지막 완납 이후 종결`;
            return `<tr title="${endReason}" style="background:#f5f5f5;opacity:0.6;">
              <td>${supportBadge(sup)} <span style="display:inline-block;background:#757575;color:white;font-size:9px;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:bold;vertical-align:middle;" title="${endReason}">종결</span></td>
              <td style="color:#999;font-size:11px;">-</td>
              <td style="color:#999;font-size:11px;">-</td>
              <td style="color:#999;font-size:11px;">-</td>
              <td style="color:#999;font-size:11px;">${paidPayments.length === 0 ? '미시작·종결' : latestPaidMk + ' 종결'}</td>
            </tr>`;
          }
          return `<tr title="최근 완납 ${latestPaidMk} · 수업 상세정보 미입력" style="background:#fff8e1;">
            <td>${supportBadge(sup)} <span style="font-size:10px;color:#e65100;font-weight:bold;">📌 납부기록 감지</span></td>
            <td style="color:#e65100;">?</td>
            <td style="color:#e65100;">?</td>
            <td style="color:#e65100;">?</td>
            <td style="color:#e65100;font-size:11px;">수업정보 미입력</td>
          </tr>`;
        }).join('');

        const tableBody = (therapies.length || inferredRows)
          ? (rows + inferredRows)
          : `<tr><td colspan="6" class="no-therapy">납부현황에 등록된 수업 정보가 없습니다.</td></tr>`;

        return `
        <div class="child-card">
          <div class="child-header">
            <div>
              <a href="child-profile.html?id=${c.id}" style="text-decoration:none;"><span class="child-name" style="cursor:pointer;">${c.name}</span></a>
              <span class="child-birth" style="margin-left:8px;">${fmtBirth(c.birth)}</span>
              <span class="child-age" style="margin-left:6px;">(${calcAge(c.birth)})</span>
            </div>
            <div>
              <span class="status-dot" style="background:${color};"></span>
              <span class="status-label">${st}</span>
            </div>
            ${c.managerId ? `<div style="font-size:11px;color:#999;">관리자번호: ${c.managerId}</div>` : ''}
            <div style="margin-left:auto;display:flex;gap:6px;">
              <button onclick="_viewAssessments('${c.id}')" style="padding:5px 10px;background:#e3f2fd;color:#1565c0;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">📋 상담지 조회</button>
              <button onclick="_viewChildDocs('${c.id}','eval_report')" style="padding:5px 10px;background:#fff3e0;color:#e65100;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">📄 평가보고서</button>
              <button onclick="_viewChildDocs('${c.id}','consent_form')" style="padding:5px 10px;background:#f3e5f5;color:#6a1b9a;border:none;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">📷 촬영동의서</button>
            </div>
          </div>
          <table class="therapy-table">
            <thead>
              <tr>
                <th>지원유형</th>
                <th>담당치료사</th>
                <th>수업요일</th>
                <th>수업시간</th>
                <th>본인부담금 유형</th>
              </tr>
            </thead>
            <tbody>${tableBody}</tbody>
          </table>
        </div>`;
      }).join('');
    }

    function logout() { localStorage.removeItem('currentUser'); location.href = 'index.html'; }

    // ==================== 초기상담지 토큰 발급/조회 ====================
    function _calcMonths(birth) {
      const d = String(birth||'').replace(/\D/g,'');
      let y,m,day;
      if (d.length === 8) { y=+d.slice(0,4); m=+d.slice(4,6); day=+d.slice(6,8); }
      else if (d.length === 6) { y=2000+ +d.slice(0,2); m=+d.slice(2,4); day=+d.slice(4,6); }
      else return null;
      const now = new Date(), bd = new Date(y,m-1,day);
      if (isNaN(bd)) return null;
      let mo = (now.getFullYear()-bd.getFullYear())*12 + (now.getMonth()-bd.getMonth());
      if (now.getDate() < bd.getDate()) mo--;
      return mo;
    }
    function _monthsToAg(mo) {
      if (mo==null) return null;
      if (mo>=19 && mo<=24) return '19_24';
      if (mo>=25 && mo<=36) return '25_36';
      if (mo>=37 && mo<=48) return '37_48';
      if (mo>=49 && mo<=60) return '49_60';
      return null;
    }
    function _genToken() {
      const arr = new Uint8Array(24);
      (window.crypto||window.msCrypto).getRandomValues(arr);
      return Array.from(arr,b=>b.toString(16).padStart(2,'0')).join('');
    }
    function _issueAssessmentLink(childId) {
      const child = (JSON.parse(localStorage.getItem('children')||'[]')).find(c=>c.id===childId);
      if (!child) return alert('아동 정보를 찾을 수 없습니다.');
      const months = _calcMonths(child.birth);
      const ag = _monthsToAg(months);
      if (!ag) {
        if (!confirm(`아동 개월수: ${months==null?'계산불가':months+'개월'}\n초기상담지 지원 범위(19~60개월) 밖입니다.\n\n그래도 링크를 발급할까요? (연령대 미지정)`)) return;
      }
      const tokens = JSON.parse(localStorage.getItem('assessment_tokens')||'[]');
      const now = new Date();
      const exp = new Date(now.getTime() + 30*24*60*60*1000);
      const rec = {
        id: 'tk_'+Date.now(),
        child_id: childId,
        token: _genToken(),
        age_group: ag || '',
        issued_at: now.toISOString(),
        expires_at: exp.toISOString(),
        is_used: false,
      };
      tokens.unshift(rec);
      localStorage.setItem('assessment_tokens', JSON.stringify(tokens));
      const url = `https://jet73kyj.github.io/namu-link/assessment.html?token=${rec.token}`;
      const msg = `📩 초기상담지 링크 발급 완료\n\n아동: ${child.name} (${months||'?'}개월, ${ag||'범위밖'})\n만료: ${exp.toLocaleDateString('ko-KR')}\n\n[학부모께 아래 링크 전달]\n${url}\n\n"확인" 클릭 시 링크가 클립보드에 복사됩니다.`;
      if (confirm(msg)) {
        try { navigator.clipboard.writeText(url); alert('✅ 링크가 클립보드에 복사되었습니다.\n카카오톡·문자로 학부모께 전달해주세요.'); }
        catch(e) { prompt('아래 링크를 복사해서 전달해주세요:', url); }
      }
    }
    function _viewAssessments(childId) {
      const list = (JSON.parse(localStorage.getItem('initial_assessments')||'[]')).filter(x=>x.child_id===childId);
      const tokens = (JSON.parse(localStorage.getItem('assessment_tokens')||'[]')).filter(x=>x.child_id===childId);
      const child = (JSON.parse(localStorage.getItem('children')||'[]')).find(c=>c.id===childId);
      document.getElementById('_assessModal')?.remove();
      const modal = document.createElement('div');
      modal.id = '_assessModal';
      modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
      const AG_LABEL = {'19_24':'19~24개월','25_36':'25~36개월','37_48':'37~48개월','49_60':'49~60개월'};
      let body = '';
      // 발급된 토큰 목록
      body += '<h4 style="margin:0 0 8px;color:#2e7d32;">🔗 발급된 링크</h4>';
      if (!tokens.length) body += '<div style="color:#aaa;font-size:13px;margin-bottom:14px;">발급된 링크가 없습니다.</div>';
      else {
        body += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;">';
        body += '<tr style="background:#f5f9f0;"><th style="padding:6px;border:1px solid #ddd;">발급일</th><th style="padding:6px;border:1px solid #ddd;">연령대</th><th style="padding:6px;border:1px solid #ddd;">상태</th><th style="padding:6px;border:1px solid #ddd;">링크</th></tr>';
        tokens.forEach(t => {
          const status = t.is_used ? '<span style="color:#2e7d32;">✅ 제출완료</span>' : (new Date(t.expires_at)<new Date() ? '<span style="color:#c62828;">만료</span>' : '<span style="color:#f57c00;">대기중</span>');
          const url = `https://jet73kyj.github.io/namu-link/assessment.html?token=${t.token}`;
          body += `<tr>
            <td style="padding:6px;border:1px solid #ddd;">${new Date(t.issued_at).toLocaleDateString('ko-KR')}</td>
            <td style="padding:6px;border:1px solid #ddd;text-align:center;">${AG_LABEL[t.age_group]||'-'}</td>
            <td style="padding:6px;border:1px solid #ddd;text-align:center;">${status}</td>
            <td style="padding:6px;border:1px solid #ddd;"><button onclick="navigator.clipboard.writeText('${url}').then(()=>alert('링크 복사됨'))" style="padding:3px 8px;font-size:11px;background:#fee500;border:none;border-radius:4px;cursor:pointer;">복사</button></td>
          </tr>`;
        });
        body += '</table>';
      }
      // 제출된 응답
      // 업로드된 PDF 목록
      const docsKey = `child_docs_${childId}`;
      const docs = JSON.parse(localStorage.getItem(docsKey)||'[]').filter(d => d.category === 'assessment_upload');
      body += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h4 style="margin:0;color:#2e7d32;">📎 업로드된 초기상담지 PDF (${docs.length})</h4>
        <label style="padding:5px 10px;background:#fee500;color:#3c1e1e;border-radius:5px;font-size:12px;font-weight:bold;cursor:pointer;">
          📤 PDF 파일 업로드
          <input type="file" accept=".pdf" style="display:none;" onchange="_uploadAssessmentPdf('${childId}', this.files[0])">
        </label>
      </div>`;
      if (!docs.length) body += '<div style="color:#aaa;font-size:12px;margin-bottom:14px;">업로드된 PDF 가 없습니다. 우측 상단 버튼으로 학부모가 종이/이메일로 보낸 상담지를 등록해주세요.</div>';
      else {
        docs.forEach((d, idx) => {
          const globalIdx = JSON.parse(localStorage.getItem(docsKey)||'[]').indexOf(d);
          body += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#fafafa;border:1px solid #eee;border-radius:6px;margin-bottom:6px;">
            <div style="flex:1;font-size:12px;">
              <div style="font-weight:bold;">📄 ${escapeHtml(d.filename||'상담지.pdf')}</div>
              <div style="color:#888;font-size:11px;margin-top:2px;">${new Date(d.uploadedAt).toLocaleString('ko-KR')} · ${d.size?Math.round(d.size/1024)+' KB':''}</div>
              ${d.note?`<div style="margin-top:3px;color:#555;">${escapeHtml(d.note)}</div>`:''}
            </div>
            <div style="display:flex;gap:5px;">
              <button onclick="_previewAssessmentPdf('${childId}', ${globalIdx})" style="padding:4px 10px;background:#e3f2fd;color:#1565c0;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;">🔍 미리보기</button>
              <button onclick="_deleteAssessmentPdf('${childId}', ${globalIdx})" style="padding:4px 10px;background:#c62828;color:white;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;">삭제</button>
            </div>
          </div>`;
        });
      }
      body += '<hr style="margin:16px 0;border:none;border-top:1px solid #eee;">';
      body += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h4 style="margin:0;color:#2e7d32;">📋 온라인 제출된 초기상담지 (${list.length})</h4>
      </div>`;
      if (!list.length) body += '<div style="color:#aaa;font-size:13px;">제출된 상담지가 없습니다.</div>';
      else list.forEach(r => {
        const domains = {social_emotional:'사회·정서', language:'언어', cognitive:'인지', motor:'운동'};
        let domainHtml = '';
        Object.keys(domains).forEach(dk => {
          const resp = r['responses_'+dk] || {};
          const keys = Object.keys(resp);
          if (!keys.length) return;
          domainHtml += `<div style="margin-top:8px;"><b style="color:#558b2f;">${domains[dk]}</b><ul style="margin:4px 0 0 20px;padding:0;font-size:12px;">`;
          keys.forEach(k => { domainHtml += `<li>${escapeHtml(k)}: <b>${escapeHtml(r['responses_'+dk][k])}</b></li>`; });
          domainHtml += '</ul></div>';
        });
        body += `<div style="border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:10px;background:#fafafa;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div style="font-size:11px;color:#888;margin-bottom:6px;">제출: ${new Date(r.submitted_at).toLocaleString('ko-KR')} · ${AG_LABEL[r.age_group]||r.age_group}</div>
            <button onclick="_printAssessmentResponse('${r.id}')" style="padding:4px 10px;background:#2e7d32;color:white;border:none;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;">🖨️ PDF 출력</button>
          </div>
          <div style="font-size:13px;"><b>상담자:</b> ${escapeHtml(r.counselor_name)||'-'} | <b>연락처:</b> ${escapeHtml(r.contact)||'-'}</div>
          <div style="font-size:13px;margin-top:4px;"><b>주 호소:</b> ${escapeHtml(r.main_concern)||'-'}</div>
          ${domainHtml}
          ${r.regression_note?`<div style="margin-top:6px;font-size:12px;"><b>퇴행:</b> ${escapeHtml(r.regression_note)}</div>`:''}
          ${r.prior_evaluation?`<div style="font-size:12px;"><b>이전 평가:</b> ${escapeHtml(r.prior_evaluation)}</div>`:''}
          ${r.daycare_status?`<div style="font-size:12px;"><b>어린이집:</b> ${escapeHtml(r.daycare_status)}</div>`:''}
          ${r.family_history?`<div style="font-size:12px;"><b>가족력:</b> ${escapeHtml(r.family_history)}</div>`:''}
          ${r.summary_memo?`<div style="font-size:12px;"><b>종합 메모:</b> ${escapeHtml(r.summary_memo)}</div>`:''}
        </div>`;
      });
      modal.innerHTML = `

    // ===== 평가보고서 · 촬영동의서 (Supabase Storage) =====
    const DOC_META = {
      eval_report: { label: '평가보고서', icon: '📄', color: '#e65100', bg: '#fff3e0', accept: '.pdf,.jpg,.jpeg,.png,.hwp,.hwpx,.doc,.docx' },

    async function _uploadChildDoc(childId, category, file) {
      if (!file) return;
      if (file.size > 20*1024*1024) { alert('파일 크기가 20MB 를 초과합니다.'); return; }
      const prog = document.getElementById('_docsProgress');
      if (prog) { prog.style.display='block'; prog.textContent='⏳ 업로드 중...'; }
      try {
        if (!window.Supa) throw new Error('Supabase 클라이언트가 로드되지 않았습니다.');
        const client = await window.Supa.getClient();
        // ASCII 안전 파일명 (한글은 Supabase Storage 가 거부) — 원본은 메타에 저장
        const extMatch = file.name.match(/\.[A-Za-z0-9]{1,10}$/);
        const ext = extMatch ? extMatch[0].toLowerCase() : '';
        const stamp = Date.now();
        const rand = Math.random().toString(36).slice(2,8);
        const storagePath = `${childId}/${category}/${stamp}_${rand}${ext}`;
        const { error } = await client.storage.from(DOC_BUCKET).upload(storagePath, file, {
          cacheControl: '3600', upsert: false, contentType: file.type || 'application/octet-stream',
        });
        if (error) throw error;
        // 메타데이터 저장 (child_docs_{childId}) → 자동으로 Supabase 동기화됨
        const key = `child_docs_${childId}`;
        const arr = JSON.parse(localStorage.getItem(key)||'[]');
        arr.push({
          category, filename: file.name, size: file.size,
          storagePath, contentType: file.type || '',
          uploadedAt: new Date().toISOString(),
        });
        localStorage.setItem(key, JSON.stringify(arr));
        // Supabase child_extras 동기화
        try { await window.Supa.pushChildExtras(); } catch(e) { console.warn('child_extras 동기화 실패', e); }
        if (prog) { prog.textContent='✅ 업로드 완료'; prog.style.background='#e8f5e9'; prog.style.color='#2e7d32'; }
        setTimeout(() => _viewChildDocs(childId, category), 500);
      } catch (e) {
        console.error(e);
        if (prog) { prog.textContent='❌ 실패: ' + (e.message||e); prog.style.background='#ffebee'; prog.style.color='#c62828'; }
        else alert('업로드 실패: ' + (e.message||e));
      }
    }

    async function _downloadChildDoc(childId, idx) {
      const arr = JSON.parse(localStorage.getItem(`child_docs_${childId}`)||'[]');
      const d = arr[idx];
      if (!d || !d.storagePath) return alert('파일 정보가 없습니다.');
      try {
        const client = await window.Supa.getClient();
        // 1시간 유효한 서명 URL 생성
        const { data, error } = await client.storage.from(DOC_BUCKET).createSignedUrl(d.storagePath, 3600);
        if (error) throw error;
        window.open(data.signedUrl, '_blank');
      } catch (e) {
        alert('다운로드 실패: ' + (e.message||e));
      }
    }

    async function _deleteChildDoc(childId, idx, category) {
      if (!confirm('이 파일을 삭제하시겠습니까?\n(Supabase Storage 에서도 함께 삭제됩니다)')) return;
      const key = `child_docs_${childId}`;
      const arr = JSON.parse(localStorage.getItem(key)||'[]');
      const d = arr[idx];
      if (!d) return;
      try {
        if (d.storagePath) {
          const client = await window.Supa.getClient();
          const { error } = await client.storage.from(DOC_BUCKET).remove([d.storagePath]);
          if (error) console.warn('Storage 삭제 실패(계속 진행):', error);
        }
        arr.splice(idx, 1);
        localStorage.setItem(key, JSON.stringify(arr));
        try { await window.Supa.pushChildExtras(); } catch(e) {}
        _viewChildDocs(childId, category);
      } catch (e) {
        alert('삭제 실패: ' + (e.message||e));
      }
    }

    // ===== CSV 일괄 업로드 =====
    // 헤더: 이름, 생년월일, 성별, 보호자명, 연락처, 관리자번호 (한글 유연 매칭)
    function _parseCsv(text) {
      // BOM 제거
      text = text.replace(/^﻿/, '');
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (!lines.length) return { headers:[], rows:[] };
      const parseLine = (line) => {
        const out = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (inQ) {
            if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
            else if (c === '"') { inQ = false; }
            else { cur += c; }
          } else {
            if (c === '"') inQ = true;
            else if (c === ',') { out.push(cur); cur = ''; }
            else cur += c;
          }
        }
        out.push(cur);
        return out.map(s => s.trim());
      };
      const headers = parseLine(lines[0]);
      const rows = lines.slice(1).map(parseLine);
      return { headers, rows };
    }

    function _findHeaderIdx(headers, keywords) {
      for (let i = 0; i < headers.length; i++) {
        const h = headers[i].replace(/\s/g,'');
        for (const kw of keywords) if (h.includes(kw)) return i;
      }
      return -1;
    }

    function _handleCsvUpload(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const { headers, rows } = _parseCsv(reader.result);
          const idxName = _findHeaderIdx(headers, ['이름','성명','아동명']);
          const idxBirth = _findHeaderIdx(headers, ['생년월일','생년']);
          const idxGender = _findHeaderIdx(headers, ['성별']);
          const idxGuardian = _findHeaderIdx(headers, ['보호자명','보호자','부모명']);
          const idxPhone = _findHeaderIdx(headers, ['연락처','전화','휴대폰','모연락처']);
          const idxMid = _findHeaderIdx(headers, ['관리자번호','관리번호']);
          if (idxName < 0 || idxBirth < 0) {
            alert('CSV 헤더에 "이름" 과 "생년월일" 컬럼이 필요합니다.\n\n인식된 헤더:\n' + headers.join(', '));
            return;
          }

          const children = JSON.parse(localStorage.getItem('children')||'[]');
          const keyOf = (name, birth) => `${(name||'').trim()}|${String(birth||'').replace(/\D/g,'')}`;
          const byKey = new Map();
          children.forEach((c,i) => byKey.set(keyOf(c.name, c.birth), i));

          let updated = 0, added = 0, skipped = 0;
          const skippedReasons = [];
          rows.forEach((r, rIdx) => {
            const name = r[idxName] || '';
            const birth = String(r[idxBirth]||'').replace(/\D/g,'');
            if (!name.trim() || !birth) { skipped++; skippedReasons.push(`행${rIdx+2}: 이름/생년월일 누락`); return; }
            const gender = idxGender>=0 ? (r[idxGender]||'') : '';
            const guardian = idxGuardian>=0 ? (r[idxGuardian]||'') : '';
            const phone = idxPhone>=0 ? (r[idxPhone]||'') : '';
            const managerId = idxMid>=0 ? (r[idxMid]||'') : '';

            const k = keyOf(name, birth);
            if (byKey.has(k)) {
              const existing = children[byKey.get(k)];
              // 업데이트: 값이 있는 컬럼만 덮어쓰기 (빈 값으로 기존 값 지우지 않음)
              if (managerId) existing.managerId = managerId;
              if (gender)    existing.gender    = gender;
              if (guardian)  existing.guardian  = guardian;
              if (phone)     existing.phone     = phone;
              existing.updatedAt = new Date().toISOString();
              updated++;
            } else {
              // 신규 추가
              const y = /^(\d{4})01자라는/.test(managerId) ? managerId.slice(0,4) : new Date().getFullYear();
              children.push({
                id: 'ch_csv_'+(managerId||`${name}_${birth}`)+'_'+Date.now(),
                managerId,
                name: name.trim(),
                birth,
                gender,
                guardian,
                phone,
                phase: 'active',
                status: '치료중',
                therapies: [],
                createdAt: `${y}-01-01T00:00:00.000Z`,
                source: 'CSV bulk upload',
                seededAt: new Date().toISOString(),
              });
              added++;
            }
          });
          localStorage.setItem('children', JSON.stringify(children));
          const msg = `✅ CSV 일괄 업로드 완료\n\n• 업데이트: ${updated}명 (이름·생년월일 일치)\n• 신규 추가: ${added}명\n• 스킵: ${skipped}건\n\n총 처리: ${rows.length}행`;
          alert(msg + (skippedReasons.length ? '\n\n스킵 사유(최대 5건):\n' + skippedReasons.slice(0,5).join('\n') : ''));
          document.getElementById('_csvFile').value = '';
          renderList();
        } catch (err) {
          alert('❌ CSV 파싱 실패: ' + err.message);
        }
      };
      reader.readAsText(file, 'UTF-8');
    }

    renderList();
  </script>

    // Supabase 실시간 동기화 활성화
    window._supaLiveKeys = ['children','payments','records','therapists','intake_list','assessment_tokens','initial_assessments','voucher_data','assessment_events'];
    window._supaLiveOnLoad = () => { try { renderList(); } catch(e) {} };
  </script>
  <script src="js/supabase-live.js"></script>
</body>
