<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초기상담지 - 자라는나무</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { background:#f5f9f0; margin:0; font-family:'맑은 고딕','Malgun Gothic',sans-serif; }
  .wrap { max-width:720px; margin:0 auto; padding:20px 16px 60px; }
  .brand { text-align:center; margin-bottom:20px; }
  .brand h1 { color:#2e7d32; font-size:22px; margin:0; }
  .brand p { color:#666; font-size:13px; margin:4px 0 0; }
  .card { background:white; border-radius:10px; padding:18px 20px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .card h3 { margin:0 0 12px; color:#2e7d32; font-size:16px; border-left:4px solid #66bb6a; padding-left:8px; }
  .fld { margin-bottom:14px; }
  .fld label { display:block; font-size:13px; color:#333; margin-bottom:5px; font-weight:600; }
  .fld .req { color:#c62828; margin-left:3px; }
  .fld input[type=text], .fld textarea, .fld select {
    width:100%; padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:14px;
    box-sizing:border-box; font-family:inherit;
  }
  .fld textarea { min-height:70px; resize:vertical; }
  .radio-group { display:flex; flex-wrap:wrap; gap:6px; }
  .radio-group label {
    flex:1 1 auto; min-width:70px; text-align:center;
    padding:9px 8px; border:1.5px solid #c8e6c9; border-radius:7px;
    font-size:13px; color:#2e7d32; cursor:pointer; background:#f5f9f0;
    font-weight:600; display:block; margin:0;
  }
  .radio-group input[type=radio] { display:none; }
  .radio-group input[type=radio]:checked + span { background:#2e7d32; color:white; }
  .radio-group label:has(input:checked) { background:#2e7d32; color:white; border-color:#2e7d32; }
  .domain-section { margin-bottom:16px; padding-top:10px; border-top:1px dashed #e0e0e0; }
  .domain-section:first-child { border-top:none; padding-top:0; }
  .domain-title { color:#558b2f; font-size:14px; font-weight:bold; margin-bottom:10px; }
  .submit-btn {
    width:100%; padding:14px; background:#2e7d32; color:white; border:none;
    border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:10px;
  }
  .submit-btn:disabled { background:#aaa; }
  .info-box { background:#fff9c4; border-radius:8px; padding:12px 14px; font-size:13px; color:#5d4037; margin-bottom:14px; }
  .error-box { background:#ffebee; color:#c62828; padding:20px; border-radius:8px; text-align:center; }
  .done-box { background:#e8f5e9; color:#2e7d32; padding:30px 20px; border-radius:10px; text-align:center; }
  .done-box h2 { margin:0 0 10px; }
  .done-box p { margin:6px 0; }
  @media (max-width:480px) {
    .wrap { padding:12px 10px 40px; }
    .card { padding:14px 16px; }
    .brand h1 { font-size:19px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>🌿 자라는나무</h1>
    <p>초기상담지</p>
  </div>
  <div id="app"></div>
</div>

<script>
const TOKENS_KEY = 'assessment_tokens';
const RESPONSES_KEY = 'initial_assessments';
const CHILDREN_KEY = 'children';

function loadJSON(key, def) { try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(def)); } catch(e) { return def; } }
function saveJSON(key, v) { localStorage.setItem(key, JSON.stringify(v)); }
function escapeHtml(s) { return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

// URL 토큰 파싱
function getToken() {
  const p = new URLSearchParams(location.search);
  return p.get('token');
}

// 생년월일 → 개월수
function calcMonths(birth) {
  if (!birth) return null;
  const digits = String(birth).replace(/\D/g,'');
  let y,m,d;
  if (digits.length === 8) { y=+digits.slice(0,4); m=+digits.slice(4,6); d=+digits.slice(6,8); }
  else if (digits.length === 6) { y=2000+ +digits.slice(0,2); m=+digits.slice(2,4); d=+digits.slice(4,6); }
  else return null;
  const now = new Date();
  const bd = new Date(y, m-1, d);
  if (isNaN(bd.getTime())) return null;
  let months = (now.getFullYear() - bd.getFullYear()) * 12 + (now.getMonth() - bd.getMonth());
  if (now.getDate() < bd.getDate()) months--;
  return months;
}
function monthsToAgeGroup(months) {
  if (months == null) return null;
  if (months >= 19 && months <= 24) return '19_24';
  if (months >= 25 && months <= 36) return '25_36';
  if (months >= 37 && months <= 48) return '37_48';
  if (months >= 49 && months <= 60) return '49_60';
  return null;
}

function findToken(tokenStr) {
  const arr = loadJSON(TOKENS_KEY, []);
  return arr.find(t => t.token === tokenStr);
}
function findChild(childId) {
  // 정식 등록된 아동
  const arr = loadJSON(CHILDREN_KEY, []);
  const c = arr.find(c => c.id === childId);
  if (c) return c;
  // 아직 이관 전 — intake 데이터에서 조회 (child_id 가 'intake:xxx' 형식일 때)
  if (String(childId).startsWith('intake:')) {
    const intakeId = String(childId).slice(7);
    const list = loadJSON('intake_list', []);
    const it = list.find(x => x.id === intakeId);
    if (it) return { id: childId, name: it.name, birth: it.birth, phone: it.phone };
  }
  return null;
}
function markTokenUsed(tokenStr) {
  const arr = loadJSON(TOKENS_KEY, []);
  const t = arr.find(x => x.token === tokenStr);
  if (t) { t.is_used = true; t.used_at = new Date().toISOString(); saveJSON(TOKENS_KEY, arr); }
}

function renderError(msg) {
  document.getElementById('app').innerHTML =
    `<div class="error-box"><b>⚠ 접근할 수 없습니다</b><br><br>${escapeHtml(msg)}<br><br><small>문의: 042-488-6011</small></div>`;
}
function renderDone() {
  document.getElementById('app').innerHTML =
    `<div class="done-box"><h2>✅ 제출 완료</h2>
     <p>초기상담지가 정상적으로 접수되었습니다.</p>
     <p>담당 치료사가 확인 후 연락드리겠습니다.</p>
     <p style="margin-top:20px;font-size:12px;color:#666;">문의: 042-488-6011<br>카카오톡채널: <a href="http://pf.kakao.com/_AJtsG" target="_blank">http://pf.kakao.com/_AJtsG</a></p></div>`;
}

async function loadQuestions() {
  try {
    const r = await fetch('data/assessment-questions.json?ts=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    return await r.json();
  } catch(e) {
    // file:// 프로토콜 등 fetch 불가 환경에서는 안내
    throw new Error('질문 데이터를 불러올 수 없습니다. 웹 서버로 실행하거나 관리자에게 문의해주세요.');
  }
}

function renderField(f, val) {
  const req = f.required ? '<span class="req">*</span>' : '';
  const ph = f.placeholder ? ` placeholder="${escapeHtml(f.placeholder)}"` : '';
  const v = val || '';
  if (f.type === 'textarea') {
    return `<div class="fld"><label>${escapeHtml(f.label)}${req}</label><textarea name="${f.id}"${ph}>${escapeHtml(v)}</textarea></div>`;
  }
  if (f.type === 'radio' && Array.isArray(f.options)) {
    const opts = f.options.map(o => `
      <label><input type="radio" name="${f.id}" value="${escapeHtml(o)}"${v===o?' checked':''}><span>${escapeHtml(o)}</span></label>
    `).join('');
    return `<div class="fld"><label>${escapeHtml(f.label)}${req}</label><div class="radio-group">${opts}</div></div>`;
  }
  if (f.type === 'select' && Array.isArray(f.options)) {
    const opts = ['<option value="">선택</option>'].concat(f.options.map(o =>
      `<option value="${escapeHtml(o)}"${v===o?' selected':''}>${escapeHtml(o)}</option>`)).join('');
    return `<div class="fld"><label>${escapeHtml(f.label)}${req}</label><select name="${f.id}">${opts}</select></div>`;
  }
  // default: text
  return `<div class="fld"><label>${escapeHtml(f.label)}${req}</label><input type="text" name="${f.id}"${ph} value="${escapeHtml(v)}"></div>`;
}

function renderForm(data, tokenRec, child) {
  const ageGroupKey = tokenRec.age_group;
  const ag = data.age_groups[ageGroupKey];
  if (!ag) { renderError('연령대 정보가 올바르지 않습니다. (age_group=' + ageGroupKey + ')'); return; }

  const prefill = {
    child_name_dob: (child?.name || '') + (child?.birth ? ` (${child.birth})` : ''),
    contact: child?.phone || ''
  };

  let html = '';
  html += `<div class="info-box">
    <b>${escapeHtml(child?.name || '')}</b> 아동의 <b>${escapeHtml(ag.label)}</b> 초기상담지 입니다.<br>
    각 항목을 성실히 작성해 주시면, 담당 치료사가 검토 후 상담을 진행합니다.
  </div>`;

  html += '<form id="assForm" autocomplete="off">';

  // 기본 정보
  html += '<div class="card"><h3>1. 기본 정보</h3>';
  data.common_fields.forEach(f => { html += renderField(f, prefill[f.id]); });
  html += '</div>';

  // 영역별 질문
  html += `<div class="card"><h3>2. 발달 영역 체크 (${escapeHtml(ag.label)})</h3>`;
  Object.keys(ag.domains || {}).forEach(dk => {
    const d = ag.domains[dk];
    if (!d.questions || !d.questions.length) return;
    html += `<div class="domain-section"><div class="domain-title">▸ ${escapeHtml(d.label)}</div>`;
    d.questions.forEach(q => { html += renderField(q); });
    html += '</div>';
  });
  const noQs = Object.values(ag.domains||{}).every(d => !d.questions || !d.questions.length);
  if (noQs) html += '<div style="color:#888;font-size:13px;padding:10px;">※ 질문 데이터가 아직 등록되지 않았습니다. (관리자 문의)</div>';
  html += '</div>';

  // 공통 마무리
  html += '<div class="card"><h3>3. 추가 확인 사항</h3>';
  data.common_tail.forEach(f => { html += renderField(f); });
  html += '</div>';

  html += '<button type="submit" class="submit-btn">📩 제출하기</button>';
  html += '</form>';

  document.getElementById('app').innerHTML = html;

  document.getElementById('assForm').addEventListener('submit', ev => {
    ev.preventDefault();
    submitForm(data, tokenRec, child);
  });
}

function collectResponses(data, ageGroupKey) {
  const form = document.getElementById('assForm');
  const fd = new FormData(form);
  const all = {};
  fd.forEach((v,k) => { all[k] = v; });

  const domains = data.age_groups[ageGroupKey]?.domains || {};
  const domainResp = { social_emotional:{}, language:{}, cognitive:{}, motor:{} };
  Object.keys(domains).forEach(dk => {
    (domains[dk].questions || []).forEach(q => {
      if (all[q.id] !== undefined) {
        domainResp[dk][q.id] = all[q.id];
        delete all[q.id];
      }
    });
  });
  return { top: all, domains: domainResp };
}

function submitForm(data, tokenRec, child) {
  // 필수 필드 검증
  const missing = [];
  data.common_fields.filter(f=>f.required).forEach(f => {
    const el = document.querySelector(`[name="${f.id}"]`);
    if (!el || !el.value.trim()) missing.push(f.label);
  });
  if (missing.length) { alert('필수 항목이 비어있습니다:\n\n• ' + missing.join('\n• ')); return; }

  const { top, domains } = collectResponses(data, tokenRec.age_group);
  const rec = {
    id: 'ass_' + Date.now(),
    child_id: tokenRec.child_id,
    token_id: tokenRec.id,
    age_group: tokenRec.age_group,
    counselor_name: top.counselor_name || '',
    child_name_dob: top.child_name_dob || '',
    contact: top.contact || '',
    main_concern: top.main_concern || '',
    responses_social_emotional: domains.social_emotional,
    responses_language: domains.language,
    responses_cognitive: domains.cognitive,
    responses_motor: domains.motor,
    regression_note: top.regression || '',
    prior_evaluation: top.prior_evaluation || '',
    daycare_status: top.daycare_status || '',
    family_history: top.family_history || '',
    summary_memo: top.summary_memo || '',
    submitted_at: new Date().toISOString(),
    submitted_by_role: 'guardian',
    is_reviewed: false
  };
  const list = loadJSON(RESPONSES_KEY, []);
  list.unshift(rec);
  saveJSON(RESPONSES_KEY, list);
  markTokenUsed(tokenRec.token);

  if (tokenRec.external) {
    renderDoneExternal(rec);
  } else {
    renderDone();
  }
  window.scrollTo(0,0);
}

// 학부모 기기에서 제출한 경우 — 관리자에게 응답을 되돌려 보낼 수 있는 UI 제공
function renderDoneExternal(rec) {
  const AG_LABEL = {'19_24':'19~24개월','25_36':'25~36개월','37_48':'37~48개월','49_60':'49~60개월'};
  const summary = _buildSummaryText(rec, AG_LABEL[rec.age_group]||rec.age_group);
  const json = JSON.stringify(rec, null, 2);
  document.getElementById('app').innerHTML = `
    <div class="done-box">
      <h2>✅ 작성 완료</h2>
      <p>초기상담지 작성이 완료되었습니다.</p>
      <p><b>아래 방법 중 하나로 담당자에게 전달해 주세요.</b></p>
    </div>
    <div class="card" style="margin-top:14px;">
      <h3>📤 담당자에게 전달하기</h3>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="submit-btn" style="background:#fee500;color:#3c1e1e;" onclick="_copyText()">📋 내용 복사하기 (카카오톡·문자 붙여넣기)</button>
        <button class="submit-btn" style="background:#1565c0;" onclick="_downloadJSON()">💾 파일로 저장 (JSON)</button>
        <a href="http://pf.kakao.com/_AJtsG" target="_blank" style="text-decoration:none;">
          <button class="submit-btn" type="button" style="background:#fee500;color:#3c1e1e;width:100%;">💬 카카오톡채널 열기</button>
        </a>
      </div>
      <div style="margin-top:14px;">
        <label style="font-size:12px;color:#666;font-weight:bold;">📝 응답 요약 (미리보기)</label>
        <textarea id="_summaryTxt" readonly style="width:100%;min-height:220px;padding:10px;border:1px solid #ccc;border-radius:6px;font-family:'맑은 고딕',monospace;font-size:12px;margin-top:4px;box-sizing:border-box;">${summary}</textarea>
      </div>
      <p style="font-size:11px;color:#888;margin-top:10px;">📞 문의: 042-488-6011<br>💬 카카오톡채널: http://pf.kakao.com/_AJtsG</p>
    </div>`;
  window._summaryText = summary;
  window._jsonText = json;
  window._respRec = rec;
}

function _buildSummaryText(rec, agLabel) {
  const lines = [];
  lines.push('=== 자라는나무 초기상담지 ===');
  lines.push(`제출: ${new Date(rec.submitted_at).toLocaleString('ko-KR')}`);
  lines.push(`연령대: ${agLabel}`);
  lines.push(`아동: ${rec.child_name_dob||'-'}`);
  lines.push(`연락처: ${rec.contact||'-'}`);
  lines.push(`상담자: ${rec.counselor_name||'-'}`);
  lines.push('');
  lines.push('■ 주 호소');
  lines.push(rec.main_concern||'-');
  lines.push('');
  const domains = {social_emotional:'사회·정서', language:'언어', cognitive:'인지', motor:'운동'};
  Object.keys(domains).forEach(dk => {
    const resp = rec['responses_'+dk] || {};
    const keys = Object.keys(resp);
    if (!keys.length) return;
    lines.push(`■ ${domains[dk]}`);
    keys.forEach(k => lines.push(`  ${k}: ${resp[k]}`));
    lines.push('');
  });
  if (rec.regression_note)   lines.push('■ 퇴행: '+rec.regression_note);
  if (rec.prior_evaluation)  lines.push('■ 이전 평가: '+rec.prior_evaluation);
  if (rec.daycare_status)    lines.push('■ 어린이집: '+rec.daycare_status);
  if (rec.family_history)    lines.push('■ 가족력: '+rec.family_history);
  if (rec.summary_memo)      lines.push('■ 메모: '+rec.summary_memo);
  lines.push('');
  lines.push('---');
  lines.push('※ 이 내용을 담당자에게 전달해 주세요.');
  return lines.join('\n');
}

window._copyText = function() {
  const ta = document.getElementById('_summaryTxt');
  ta.select();
  try {
    navigator.clipboard.writeText(window._summaryText);
    alert('✅ 내용이 복사되었습니다.\n카카오톡·문자에 붙여넣어 담당자에게 보내주세요.');
  } catch(e) {
    document.execCommand('copy');
    alert('✅ 내용이 복사되었습니다.');
  }
};

window._downloadJSON = function() {
  const rec = window._respRec;
  const name = (rec.child_name_dob||'초기상담지').replace(/[^\w가-힣]/g,'_').slice(0,30);
  const blob = new Blob([window._jsonText], {type:'application/json;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `초기상담지_${name}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert('✅ 파일로 저장되었습니다.\n카카오톡·이메일에 첨부해 담당자에게 보내주세요.');
};

// 토큰이 URL 에 있으면 무조건 폼 진입 (localStorage 검증 우회)
// 학부모 기기에는 관리자가 발급한 토큰 정보가 없으므로 클라이언트 검증 불가능.
// 형식만 확인하고 폼을 보여주며, 아동 생년월일은 학부모가 직접 입력.
function isValidTokenFormat(t) {
  return /^[a-f0-9]{16,}$/i.test(String(t||''));
}

function renderBirthAsk(data, tokenStr) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h3>👶 아동 정보 확인</h3>
      <p style="font-size:13px;color:#555;margin:0 0 14px;">
        연령대에 맞는 문항을 안내해 드리기 위해<br>아동의 생년월일을 입력해 주세요.
      </p>
      <div class="fld"><label>아동 이름 *</label><input type="text" id="_askName" placeholder="예: 홍길동"></div>
      <div class="fld"><label>생년월일 * <span style="font-weight:normal;color:#888;font-size:11px;">(YYYY-MM-DD 또는 YYYYMMDD)</span></label>
        <input type="text" id="_askBirth" placeholder="예: 2022-03-15" inputmode="numeric"></div>
      <button class="submit-btn" onclick="_startForm()">다음 →</button>
    </div>`;
  window._boot_data = data;
  window._boot_token = tokenStr;
}

window._startForm = function() {
  const name = document.getElementById('_askName').value.trim();
  const birth = document.getElementById('_askBirth').value.trim();
  if (!name || !birth) { alert('아동 이름과 생년월일을 모두 입력해 주세요.'); return; }
  const months = calcMonths(birth);
  const ag = monthsToAgeGroup(months);
  if (!ag) {
    alert(`입력하신 생년월일 기준 개월수: ${months==null?'계산불가':months+'개월'}\n\n초기상담지 지원 범위(19~60개월) 밖입니다. 담당자에게 문의해주세요.`);
    return;
  }
  const pseudoToken = {
    id: 'ext_'+Date.now(),
    token: window._boot_token,
    child_id: 'ext:'+window._boot_token.slice(0,8),
    age_group: ag,
    is_used: false,
    expires_at: new Date(Date.now()+30*24*60*60*1000).toISOString(),
    external: true,
  };
  const pseudoChild = { id: pseudoToken.child_id, name, birth };
  renderForm(window._boot_data, pseudoToken, pseudoChild);
};

async function boot() {
  const tokenStr = getToken();
  if (!tokenStr) { renderError('토큰이 없습니다. 안내받은 링크를 다시 확인해주세요.'); return; }
  if (!isValidTokenFormat(tokenStr)) { renderError('토큰 형식이 올바르지 않습니다.\n안내받은 링크를 다시 확인해주세요.'); return; }

  let data;
  try { data = await loadQuestions(); }
  catch(e) { renderError(e.message); return; }

  // 관리자 기기에서 발급된 토큰 정보가 있으면 그대로 사용
  const tokenRec = findToken(tokenStr);
  if (tokenRec) {
    if (tokenRec.is_used) { renderError('이미 제출이 완료된 링크입니다. 재입력이 필요하시면 담당자에게 문의해주세요.'); return; }
    if (new Date(tokenRec.expires_at) < new Date()) { renderError('링크가 만료되었습니다 (30일). 담당자에게 재발급을 요청해주세요.'); return; }
    const child = findChild(tokenRec.child_id);
    if (child) {
      const months = calcMonths(child.birth);
      const calcedAg = monthsToAgeGroup(months);
      if (calcedAg && tokenRec.age_group !== calcedAg) tokenRec.age_group = calcedAg;
      renderForm(data, tokenRec, child);
      return;
    }
  }
  // 학부모 기기 등 토큰 정보가 없는 환경 — 아동 생년월일부터 물어보고 진행
  renderBirthAsk(data, tokenStr);
}
boot();
</script>
</body>
</html>
