<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나무링크 - 발달재활 기록 관리</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: white; border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); text-align: center; }
    .login-box h1 { color: #2e7d32; font-size: 24px; margin-bottom: 8px; }
    .login-box p { color: #888; font-size: 14px; margin-bottom: 28px; }
    .login-box .form-group { text-align: left; margin-bottom: 14px; }
    .login-box input { width: 100%; }
    .login-box .btn { width: 100%; padding: 12px; font-size: 16px; margin-top: 8px; }
    .error-msg { color: #c62828; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🌿 나무링크</h1>
    <p>발달재활 기록 관리 시스템</p>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="loginName" placeholder="치료사 이름 입력">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
    </div>
    <p class="error-msg" id="errorMsg">이름 또는 비밀번호가 올바르지 않습니다.</p>
    <button class="btn btn-primary" onclick="login()">로그인</button>
  </div>

  <script>
    const USERS = {
      '관리자': '1234',
      '이채린': '1234',
    };

    function login() {
      const name = document.getElementById('loginName').value.trim();
      const pw = document.getElementById('loginPw').value;
      if (USERS[name] && USERS[name] === pw) {
        localStorage.setItem('currentUser', name);
        location.href = 'children.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    if (localStorage.getItem('currentUser')) location.href = 'children.html';
  </script>
</body>
</html>
