const csvByKey = new Map();
CSV_LOOKUP.forEach(([n,b,m]) => csvByKey.set(`${n}|${b}`, m));

function normBirth(b) {
  const d = String(b||'').replace(/\D/g,'');
  if (d.length === 8) return d;
  if (d.length === 6) return '20' + d;   // 6자리는 2000년대로 확장
  return d;
}
function escapeHtml(s){ return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

// 이 이름의 아동은 중복 시 하나만 남긴다 (관리자번호 있는 항목 우선)
const DEDUP_NAMES = ['김시윤','이하윤','설연호','강은우','윤정후'];
// 별칭 병합 규칙 — {aliasName: canonicalName}
const RENAME_MAP = { '예빛': '이태은', '최유주': '최아린' };
// 종결 아동 - 관리자번호 부여 대상에서 제외
const TERMINATED_NAMES = new Set([
  '지윤성','신영윤','박서현','조수연','윤정후','김수현','김도현',
  '배준호','정대겸','김도하','정승빈','김시우','고은우'
]);

function plan() {
  const arr = JSON.parse(localStorage.getItem('children')||'[]');
  const actions = [];   // {type:'delete'|'rename'|'birthfix'|'assignMid', childIdx, ...}

  // 1) 생년월일 정규화 대상 감지 (6자리 → 8자리)
  const shortBirthKids = new Set(['김시윤','이하윤','강은우','설연호','윤정후']);
  arr.forEach((c, i) => {
    const rawB = String(c.birth||'').replace(/\D/g,'');
    if (shortBirthKids.has((c.name||'').trim()) && rawB.length === 6) {
      actions.push({ type:'birthfix', i, from: c.birth, to: '20'+rawB, name: c.name });
    }
  });

  // 2) 별칭 이름 통합 (예빛 → 이태은)
  arr.forEach((c, i) => {
    const nm = (c.name||'').trim();
    if (RENAME_MAP[nm]) {
      actions.push({ type:'rename', i, from: nm, to: RENAME_MAP[nm] });
    }
  });

  // 3) 중복 정리 — DEDUP_NAMES · '이태은' (별칭 병합 후)
  const dedupTargets = new Set([...DEDUP_NAMES, ...Object.values(RENAME_MAP)]);
  // 시뮬레이션: 위 액션 반영 후 상태를 미리 계산
  const sim = arr.map((c,i) => {
    const clone = { ...c };
    actions.forEach(a => {
      if (a.i !== i) return;
      if (a.type === 'birthfix') clone.birth = a.to;
      if (a.type === 'rename')   clone.name  = a.to;
    });
    return { clone, i };
  });
  dedupTargets.forEach(name => {
    const group = sim.filter(x => (x.clone.name||'').trim() === name);
    if (group.length <= 1) return;
    // 관리자번호 있는 것 우선, 없으면 CSV 매칭되는 것 우선, 그것도 없으면 첫 번째
    group.sort((a,b) => {
      const aM = !!(a.clone.managerId||'').trim(), bM = !!(b.clone.managerId||'').trim();
      if (aM !== bM) return aM ? -1 : 1;
      const aC = csvByKey.has(`${a.clone.name}|${normBirth(a.clone.birth)}`);
      const bC = csvByKey.has(`${b.clone.name}|${normBirth(b.clone.birth)}`);
      if (aC !== bC) return aC ? -1 : 1;
      return 0;
    });
    // group[0] 은 유지, 나머지는 삭제
    for (let k = 1; k < group.length; k++) {
      actions.push({ type:'delete', i: group[k].i, name, reason:'중복' });
    }
  });

  // 4) 관리자번호 부여 — 위 정리 반영 후, managerId 비어있는 아동만 대상
  const deletedSet = new Set(actions.filter(a=>a.type==='delete').map(a=>a.i));
  sim.forEach(({clone, i}) => {
    if (deletedSet.has(i)) return;
    if ((clone.managerId||'').trim()) return;
    if (TERMINATED_NAMES.has((clone.name||'').trim())) return;   // 종결 아동 제외
    const nb = normBirth(clone.birth);
    const key = `${(clone.name||'').trim()}|${nb}`;
    const mid = csvByKey.get(key);
    if (mid) actions.push({ type:'assignMid', i, name: clone.name, birth: clone.birth, mid });
  });

  return { arr, actions };
}

function renderPreview() {
  const { arr, actions } = plan();
  const birthfix = actions.filter(a=>a.type==='birthfix');
  const rename = actions.filter(a=>a.type==='rename');
  const del = actions.filter(a=>a.type==='delete');
  const assign = actions.filter(a=>a.type==='assignMid');

  let html = `<div style="margin-bottom:10px;font-size:13px;">
    총 <b>${arr.length}</b>건 중:
    <span style="color:#e65100;">생년월일 보정 ${birthfix.length}</span> ·
    <span style="color:#1565c0;">이름 변경 ${rename.length}</span> ·
    <span style="color:#c62828;">삭제 ${del.length}</span> ·
    <span style="color:#2e7d32;">관리자번호 부여 ${assign.length}</span>
  </div>`;

  if (birthfix.length) {
    html += '<h4>1) 생년월일 정규화</h4><table class="pv"><thead><tr><th>이름</th><th>기존</th><th>보정</th></tr></thead><tbody>';
    birthfix.forEach(a => { html += `<tr class="update-row"><td>${escapeHtml(a.name)}</td><td>${escapeHtml(a.from)}</td><td><b>${escapeHtml(a.to)}</b></td></tr>`; });
    html += '</tbody></table>';
  }
  if (rename.length) {
    html += '<h4 style="margin-top:14px;">2) 이름 통합</h4><table class="pv"><thead><tr><th>기존</th><th>변경</th></tr></thead><tbody>';
    rename.forEach(a => { html += `<tr class="update-row"><td>${escapeHtml(a.from)}</td><td><b>${escapeHtml(a.to)}</b></td></tr>`; });
    html += '</tbody></table>';
  }
  if (del.length) {
    html += '<h4 style="margin-top:14px;">3) 중복 삭제</h4><table class="pv"><thead><tr><th>이름</th><th>생년월일</th><th>관리자번호</th><th>사유</th></tr></thead><tbody>';
    del.forEach(a => {
      const c = arr[a.i];
      html += `<tr class="delete-row"><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.birth)}</td><td>${escapeHtml(c.managerId||'-')}</td><td>${escapeHtml(a.reason)}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  if (assign.length) {
    html += '<h4 style="margin-top:14px;">4) 관리자번호 부여</h4><table class="pv"><thead><tr><th>이름</th><th>생년월일</th><th>관리자번호 (부여)</th></tr></thead><tbody>';
    assign.forEach(a => { html += `<tr class="keep-row"><td>${escapeHtml(a.name)}</td><td>${escapeHtml(a.birth)}</td><td style="font-family:monospace;font-weight:bold;">${escapeHtml(a.mid)}</td></tr>`; });
    html += '</tbody></table>';
  }
  if (!birthfix.length && !rename.length && !del.length && !assign.length) {
    html += '<div style="color:#aaa;padding:20px;text-align:center;">정리할 항목이 없습니다.</div>';
  }
  document.getElementById('previewArea').innerHTML = html;
}

function applyAll() {
  const { arr, actions } = plan();
  if (!actions.length) { alert('처리할 항목이 없습니다.'); return; }
  if (!confirm(`${actions.length}건의 작업을 적용합니다.\n계속하시겠습니까?`)) return;

  // 순서: birthfix → rename → assignMid → delete (삭제는 인덱스 변화 없이 마지막)
  actions.filter(a=>a.type==='birthfix').forEach(a => { arr[a.i].birth = a.to; arr[a.i].updatedAt = new Date().toISOString(); });
  actions.filter(a=>a.type==='rename').forEach(a => { arr[a.i].name = a.to; arr[a.i].updatedAt = new Date().toISOString(); });
  actions.filter(a=>a.type==='assignMid').forEach(a => { arr[a.i].managerId = a.mid; arr[a.i].updatedAt = new Date().toISOString(); });

  // 삭제는 인덱스 큰 것부터
  const delIdxs = actions.filter(a=>a.type==='delete').map(a=>a.i).sort((x,y)=>y-x);
  delIdxs.forEach(i => { arr.splice(i,1); });

  localStorage.setItem('children', JSON.stringify(arr));
  const summary = `✅ 정리 완료\n\n생년월일 보정: ${actions.filter(a=>a.type==='birthfix').length}건\n이름 통합: ${actions.filter(a=>a.type==='rename').length}건\n중복 삭제: ${delIdxs.length}건\n관리자번호 부여: ${actions.filter(a=>a.type==='assignMid').length}건\n\n남은 아동: ${arr.length}명`;
  alert(summary);
  renderPreview();
}
