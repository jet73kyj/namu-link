<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자료실 - 나무링크</title>
  <link rel="stylesheet" href="css/style.css">
  <script>if(localStorage.getItem("currentUserRole")==="guardian")location.href="guardian-home.html";</script>
  <script src="js/supabase-client.js"></script>
  <script src="js/supabase-live.js"></script>
  <style>
    .container { max-width: 1000px; }
    .filter-bar { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .filter-btn { padding:6px 12px; border:1px solid #ccc; background:white; border-radius:16px; font-size:12px; cursor:pointer; }
    .filter-btn.active { background:#2e7d32; color:white; border-color:#2e7d32; }
    .search-wrap { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .search-wrap input { flex:1; padding:8px 12px; border:1px solid #ccc; border-radius:6px; font-size:13px; }
    .form-list { display:flex; flex-direction:column; gap:10px; }
    .form-card { background:white; border:1px solid #e0e0e0; border-radius:10px; padding:14px 18px; display:flex; align-items:center; gap:14px; }
    .form-icon { font-size:32px; flex-shrink:0; }
    .form-info { flex:1; min-width:0; }
    .form-head { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
    .cat-tag { padding:2px 9px; font-size:11px; font-weight:bold; border-radius:12px; }
    .cat-voucher   { background:#fff3e0; color:#e65100; }
    .cat-record    { background:#e3f2fd; color:#1565c0; }
    .cat-consent   { background:#f3e5f5; color:#6a1b9a; }
    .cat-admin     { background:#e0f2f1; color:#00695c; }
    .cat-etc       { background:#e0e0e0; color:#555; }
    .form-title { font-size:15px; font-weight:bold; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .form-desc { color:#666; font-size:12px; margin-top:3px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .form-meta { font-size:11px; color:#999; margin-top:4px; }
    .form-actions { display:flex; gap:6px; flex-shrink:0; }
    .btn { padding:7px 14px; border:none; border-radius:6px; font-size:12px; font-weight:bold; cursor:pointer; }
    .btn-download { background:#2e7d32; color:white; }
    .btn-edit { background:#e3f2fd; color:#1565c0; }
    .btn-delete { background:#c62828; color:white; }
    .btn-primary { background:#2e7d32; color:white; }
    .btn-secondary { background:#e0e0e0; color:#333; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .modal { background:white; border-radius:10px; width:560px; max-width:95vw; max-height:90vh; overflow-y:auto; }
    .modal-head { padding:14px 20px; background:#2e7d32; color:white; display:flex; justify-content:space-between; align-items:center; }
    .modal-head h3 { margin:0; font-size:16px; }
    .modal-body { padding:20px; }
    .form-row { margin-bottom:12px; }
    .form-row label { display:block; font-size:12px; font-weight:bold; color:#555; margin-bottom:4px; }
    .form-row input, .form-row textarea, .form-row select { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; box-sizing:border-box; font-family:inherit; }
    .form-row textarea { min-height:80px; resize:vertical; }
    .form-actions-modal { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
    .empty { padding:40px; text-align:center; color:#aaa; }
    .file-info { padding:10px 12px; background:#f5f9f0; border:1px solid #c8e6c9; border-radius:6px; font-size:12px; color:#2e7d32; margin-top:6px; }
    .progress { margin-top:10px; padding:10px; border-radius:6px; font-size:12px; text-align:center; }
    .progress.info { background:#e3f2fd; color:#1565c0; }
    .progress.ok { background:#e8f5e9; color:#2e7d32; }
    .progress.err { background:#ffebee; color:#c62828; }
  </style>
</head>
<body>
  <header>
    <h1>🌿 나무링크</h1>
    <span id="userLabel" style="font-size:14px;"></span>
  </header>
  <nav>
    <a href="children.html">아동 관리</a>
    <a href="records.html">치료 기록</a>
    <a href="calendar.html">아동 스케줄</a>
    <a href="payments.html">납부 관리</a>
    <a href="therapists.html">치료사 관리</a>
    <a href="notice.html">공지사항</a>
    <a href="forms.html" class="active">자료실</a>
    <a href="#" onclick="logout()">로그아웃</a>
  </nav>

  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="page-title">📁 자료실</div>
      <div id="adminActions" style="display:none;">
        <button class="btn btn-primary" onclick="openEditor()">📤 서식 업로드</button>
      </div>
    </div>

    <div class="card" style="padding:14px 18px;">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="서식 이름·설명 검색..." oninput="renderList()">
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="all"     onclick="setCatFilter('all')">전체 <span id="cnt_all"></span></button>
        <button class="filter-btn"        data-cat="voucher" onclick="setCatFilter('voucher')">발달바우처</button>
        <button class="filter-btn"        data-cat="record"  onclick="setCatFilter('record')">치료 기록지</button>
        <button class="filter-btn"        data-cat="consent" onclick="setCatFilter('consent')">보호자 동의서</button>
        <button class="filter-btn"        data-cat="admin"   onclick="setCatFilter('admin')">행정 서식</button>
        <button class="filter-btn"        data-cat="etc"     onclick="setCatFilter('etc')">기타</button>
      </div>
      <div id="formList" class="form-list"></div>
    </div>
  </div>

  <!-- 업로드/편집 모달 -->
  <div id="editorBg" class="modal-bg" style="display:none;">
    <div class="modal">
      <div class="modal-head">
        <h3 id="editorTitle">서식 업로드</h3>
        <button onclick="closeEditor()" style="background:transparent;color:white;border:none;font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edId">
        <input type="hidden" id="edExistingPath">
        <div class="form-row">
          <label>카테고리</label>
          <select id="edCategory">
            <option value="voucher">발달바우처</option>
            <option value="record">치료 기록지</option>
            <option value="consent">보호자 동의서</option>
            <option value="admin">행정 서식</option>
            <option value="etc">기타</option>
          </select>
        </div>
        <div class="form-row">
          <label>서식 이름 *</label>
          <input type="text" id="edName" placeholder="예: 2026년 발달재활 결과보고서">
        </div>
        <div class="form-row">
          <label>설명 (선택)</label>
          <textarea id="edDesc" placeholder="용도·작성 요령 등을 간단히 안내"></textarea>
        </div>
        <div class="form-row">
          <label id="edFileLabel">파일 * (PDF, HWP, DOC, XLS 등 20MB 이하)</label>
          <input type="file" id="edFile">
          <div id="edFileInfo" class="file-info" style="display:none;"></div>
        </div>
        <div id="edProgress" class="progress" style="display:none;"></div>
        <div class="form-actions-modal">
          <button class="btn btn-secondary" onclick="closeEditor()">취소</button>
          <button class="btn btn-primary" onclick="saveForm()">저장</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('currentUser')) location.href = 'index.html';
    const CURRENT_USER = localStorage.getItem('currentUser') || '';
    const IS_ADMIN = (CURRENT_USER === '관리자');
    document.getElementById('userLabel').textContent = CURRENT_USER + '님';
    if (IS_ADMIN) document.getElementById('adminActions').style.display = 'block';
    function logout() { localStorage.removeItem('currentUser'); location.href = 'index.html'; }

    const FORMS_BUCKET = 'forms';
    const CAT_LABEL = {
      voucher:'발달바우처', record:'치료 기록지', consent:'보호자 동의서', admin:'행정 서식', etc:'기타',
    };
    const CAT_CLASS = {
      voucher:'cat-voucher', record:'cat-record', consent:'cat-consent', admin:'cat-admin', etc:'cat-etc',
    };
    const CAT_ICON = {
      voucher:'🎫', record:'📝', consent:'📋', admin:'🗂️', etc:'📎',
    };
    function escapeHtml(s){ return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
    function fmtSize(b){ if(!b) return ''; return b<1024?b+'B':b<1024*1024?Math.round(b/1024)+'KB':(b/1024/1024).toFixed(1)+'MB'; }
    function fileIcon(name){ const ext=(name||'').split('.').pop().toLowerCase(); return {pdf:'📕',hwp:'📘',hwpx:'📘',doc:'📄',docx:'📄',xls:'📊',xlsx:'📊',ppt:'📽️',pptx:'📽️',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',zip:'🗜️'}[ext]||'📎'; }

    let catFilter = 'all';

    function getAll() {
      try { return JSON.parse(localStorage.getItem('forms')||'[]'); } catch(e) { return []; }
    }
    function setAll(arr) { localStorage.setItem('forms', JSON.stringify(arr)); }

    function setCatFilter(cat) {
      catFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
      renderList();
    }

    function renderList() {
      const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
      const all = getAll();
      let list = catFilter==='all' ? all : all.filter(f => f.category===catFilter);
      if (q) list = list.filter(f => (f.name||'').toLowerCase().includes(q) || (f.description||'').toLowerCase().includes(q));
      list.sort((a,b) => (b.created_at||'').localeCompare(a.created_at||''));
      document.getElementById('cnt_all').textContent = ' ('+all.length+')';
      const box = document.getElementById('formList');
      if (!list.length) { box.innerHTML = '<div class="empty">등록된 서식이 없습니다.</div>'; return; }
      box.innerHTML = list.map(f => {
        const catCls = CAT_CLASS[f.category] || 'cat-etc';
        const catLabel = CAT_LABEL[f.category] || '기타';
        const date = f.created_at ? new Date(f.created_at).toLocaleDateString('ko-KR') : '';
        return `<div class="form-card">
          <div class="form-icon">${fileIcon(f.filename)}</div>
          <div class="form-info">
            <div class="form-head">
              <span class="cat-tag ${catCls}">${catLabel}</span>
              <span class="form-title">${escapeHtml(f.name)}</span>
            </div>
            ${f.description?`<div class="form-desc">${escapeHtml(f.description)}</div>`:''}
            <div class="form-meta">${escapeHtml(f.filename||'')} · ${fmtSize(f.size)} · ${escapeHtml(f.created_by||'')} · ${date}</div>
          </div>
          <div class="form-actions">
            <button class="btn btn-download" onclick="downloadForm('${f.id}')">⬇ 다운로드</button>
            ${IS_ADMIN?`<button class="btn btn-edit" onclick="editForm('${f.id}')">수정</button>
                        <button class="btn btn-delete" onclick="deleteForm('${f.id}')">삭제</button>`:''}
          </div>
        </div>`;
      }).join('');
    }

    function openEditor(id) {
      if (!IS_ADMIN) return;
      const editing = !!id;
      document.getElementById('editorTitle').textContent = editing ? '서식 수정' : '서식 업로드';
      document.getElementById('edProgress').style.display='none';
      document.getElementById('edFileInfo').style.display='none';
      document.getElementById('edFile').value = '';
      if (editing) {
        const f = getAll().find(x => x.id===id);
        if (!f) return;
        document.getElementById('edId').value = f.id;
        document.getElementById('edExistingPath').value = f.storagePath || '';
        document.getElementById('edCategory').value = f.category || 'etc';
        document.getElementById('edName').value = f.name || '';
        document.getElementById('edDesc').value = f.description || '';
        document.getElementById('edFileLabel').textContent = '파일 (변경 시에만 선택 · 기존: ' + (f.filename||'') + ')';
      } else {
        document.getElementById('edId').value = '';
        document.getElementById('edExistingPath').value = '';
        document.getElementById('edCategory').value = 'voucher';
        document.getElementById('edName').value = '';
        document.getElementById('edDesc').value = '';
        document.getElementById('edFileLabel').textContent = '파일 * (PDF, HWP, DOC, XLS 등 20MB 이하)';
      }
      document.getElementById('editorBg').style.display = 'flex';
    }
    function closeEditor() { document.getElementById('editorBg').style.display = 'none'; }
    function editForm(id) { openEditor(id); }

    document.getElementById('edFile').addEventListener('change', e => {
      const f = e.target.files[0];
      const info = document.getElementById('edFileInfo');
      if (!f) { info.style.display='none'; return; }
      info.style.display='block';
      info.textContent = `📎 ${f.name} · ${fmtSize(f.size)}`;
    });

    async function saveForm() {
      if (!IS_ADMIN) return;
      const id = document.getElementById('edId').value || ('form_' + Date.now() + '_' + Math.random().toString(36).slice(2,7));
      const editing = !!document.getElementById('edId').value;
      const name = document.getElementById('edName').value.trim();
      const desc = document.getElementById('edDesc').value.trim();
      const category = document.getElementById('edCategory').value;
      const fileInput = document.getElementById('edFile');
      const file = fileInput.files[0];
      const existingPath = document.getElementById('edExistingPath').value;

      if (!name) { alert('서식 이름을 입력하세요.'); return; }
      if (!editing && !file) { alert('파일을 선택하세요.'); return; }
      if (file && file.size > 20*1024*1024) { alert('파일 크기가 20MB 를 초과합니다.'); return; }

      const prog = document.getElementById('edProgress');
      prog.style.display='block'; prog.className='progress info'; prog.textContent='⏳ 저장 중...';
      try {
        if (!window.Supa) throw new Error('Supabase 클라이언트 로드 실패');
        const client = await window.Supa.getClient();

        const all = getAll();
        const idx = all.findIndex(x => x.id===id);
        const now = new Date().toISOString();
        let storagePath = existingPath || '';
        let filename = editing ? (all[idx]?.filename||'') : '';
        let size = editing ? (all[idx]?.size||0) : 0;
        let contentType = editing ? (all[idx]?.contentType||'') : '';

        // 파일 새로 업로드 (신규 등록 · 편집 시 파일 교체)
        if (file) {
          // 편집 시 기존 파일 삭제 (이름 다를 수 있음)
          if (existingPath) {
            try { await client.storage.from(FORMS_BUCKET).remove([existingPath]); } catch(e) { console.warn('구버전 파일 삭제 실패', e); }
          }
          const safeName = file.name.replace(/[^\w.\-가-힣]/g,'_');
          storagePath = `${id}/${Date.now()}_${safeName}`;
          const { error } = await client.storage.from(FORMS_BUCKET).upload(storagePath, file, {
            cacheControl:'3600', upsert:false, contentType: file.type || 'application/octet-stream',
          });
          if (error) throw error;
          filename = file.name;
          size = file.size;
          contentType = file.type || '';
        }

        const rec = {
          id, name, description: desc, category,
          filename, size, contentType, storagePath,
          created_by: editing ? (all[idx].created_by || CURRENT_USER) : CURRENT_USER,
          created_at: editing ? (all[idx].created_at || now) : now,
          updated_at: now,
        };
        if (idx >= 0) all[idx] = rec; else all.push(rec);
        setAll(all);
        await window.Supa.pushKey('forms');
        prog.className='progress ok'; prog.textContent='✅ 저장 완료';
        setTimeout(() => { closeEditor(); renderList(); }, 500);
      } catch (e) {
        console.error(e);
        prog.className='progress err'; prog.textContent='❌ 실패: ' + (e.message||e);
      }
    }

    async function downloadForm(id) {
      const f = getAll().find(x => x.id===id);
      if (!f || !f.storagePath) return alert('파일 정보가 없습니다.');
      try {
        const client = await window.Supa.getClient();
        const { data, error } = await client.storage.from(FORMS_BUCKET).createSignedUrl(f.storagePath, 3600, { download: f.filename });
        if (error) throw error;
        window.open(data.signedUrl, '_blank');
      } catch (e) {
        alert('다운로드 실패: ' + (e.message||e));
      }
    }

    async function deleteForm(id) {
      if (!IS_ADMIN) return;
      const f = getAll().find(x => x.id===id);
      if (!f) return;
      if (!confirm(`"${f.name}" 서식을 삭제하시겠습니까?\n(Supabase Storage 에서도 함께 삭제됩니다)`)) return;
      try {
        if (f.storagePath) {
          const client = await window.Supa.getClient();
          const { error } = await client.storage.from(FORMS_BUCKET).remove([f.storagePath]);
          if (error) console.warn('Storage 삭제 실패(계속 진행):', error);
        }
        const all = getAll().filter(x => x.id !== id);
        setAll(all);
        if (window.Supa) await window.Supa.deleteKey('forms', [id]);
        renderList();
      } catch (e) {
        alert('삭제 실패: ' + (e.message||e));
      }
    }

    async function syncPull() {
      try { if (window.Supa) await window.Supa.pullKey('forms'); }
      catch (e) { console.warn('Supabase pull 실패', e); }
    }

    (async () => {
      await syncPull();
      renderList();
    })();
  </script>
</body>
</html>
