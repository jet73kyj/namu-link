<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아동 프로필 - 나무링크</title>
<link rel="stylesheet" href="css/style.css"><script>if(localStorage.getItem("currentUserRole")==="guardian")location.href="guardian-home.html";</script>
<style>
  .profile-wrap { max-width:1080px; margin:0 auto; padding:20px; }
  .p-head { background:linear-gradient(135deg,#e8f5e9,#f5f9f0); border-radius:12px; padding:20px 24px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .p-head h1 { margin:0; color:#2e7d32; font-size:24px; }
  .p-head .sub { color:#666; font-size:13px; margin-top:4px; }
  .p-head .status-pill { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:bold; }
  .st-치료중 { background:#e8f5e9; color:#2e7d32; }
  .st-대기중 { background:#fff3e0; color:#e65100; }
  .st-종결 { background:#eeeeee; color:#666; }
  .tabs { display:flex; gap:4px; border-bottom:2px solid #e0e0e0; margin-bottom:16px; overflow-x:auto; }
  .tab { padding:11px 18px; cursor:pointer; font-size:14px; font-weight:bold; color:#666; border-bottom:3px solid transparent; margin-bottom:-2px; white-space:nowrap; }
  .tab.active { color:#2e7d32; border-bottom-color:#2e7d32; background:#f5f9f0; }
  .panel { display:none; }
  .panel.active { display:block; }
  .card { background:white; border-radius:10px; padding:18px 22px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
  .card h3 { margin:0 0 12px; color:#2e7d32; font-size:15px; border-left:4px solid #66bb6a; padding-left:8px; }
  .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
  .info-item label { display:block; font-size:11px; color:#888; margin-bottom:2px; }
  .info-item .v { font-size:14px; color:#333; font-weight:600; }
  table.tbl { width:100%; border-collapse:collapse; font-size:13px; }
  table.tbl th { background:#f5f9f0; color:#2e7d32; font-size:12px; padding:8px; border-bottom:1px solid #e0e0e0; text-align:left; }
  table.tbl td { padding:8px; border-bottom:1px solid #f0f0f0; vertical-align:top; }
  .btn { padding:6px 14px; border:none; border-radius:6px; font-size:12px; font-weight:bold; cursor:pointer; }
  .btn-primary { background:#2e7d32; color:white; }
  .btn-sub { background:#f5f5f5; color:#333; border:1px solid #ddd; }
  .btn-danger { background:#c62828; color:white; }
  .btn-small { padding:4px 10px; font-size:11px; }
  .timeline { list-style:none; padding:0; margin:0; }
  .timeline li { position:relative; padding-left:22px; margin-bottom:12px; border-left:2px solid #c8e6c9; padding-bottom:8px; }
  .timeline li:before { content:''; position:absolute; left:-6px; top:2px; width:10px; height:10px; border-radius:50%; background:#66bb6a; }
  .timeline .date { font-size:11px; color:#888; }
  .timeline .title { font-weight:bold; color:#333; margin:2px 0; }
  .timeline .desc { font-size:13px; color:#555; }
  .memo-row { display:flex; gap:10px; align-items:flex-start; padding:10px; border-bottom:1px solid #f0f0f0; }
  .memo-row:last-child { border-bottom:none; }
  .memo-date { font-size:11px; color:#888; min-width:80px; }
  .memo-content { flex:1; font-size:13px; }
  .memo-chk { padding-top:2px; }
  .empty { color:#aaa; text-align:center; padding:30px; font-size:13px; }
  .add-btn { padding:8px 14px; background:#2e7d32; color:white; border:none; border-radius:6px; font-size:13px; font-weight:bold; cursor:pointer; }
  .doc-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:#fafafa; border:1px solid #eee; border-radius:6px; margin-bottom:6px; }
  .doc-info { flex:1; font-size:13px; }
  .doc-info .fname { font-weight:bold; color:#333; }
  .doc-info .meta { font-size:11px; color:#888; margin-top:2px; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:none; align-items:center; justify-content:center; }
  .modal-bg.show { display:flex; }
  .modal-box { background:white; border-radius:10px; width:520px; max-width:92vw; max-height:90vh; overflow-y:auto; }
  .modal-head { padding:14px 20px; background:#2e7d32; color:white; display:flex; justify-content:space-between; align-items:center; }
  .modal-body { padding:18px 20px; }
  .fld { margin-bottom:12px; }
  .fld label { display:block; font-size:12px; color:#555; margin-bottom:4px; font-weight:bold; }
  .fld input, .fld textarea, .fld select {
    width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; box-sizing:border-box; font-family:inherit;
  }
  .fld textarea { min-height:70px; resize:vertical; }
  .modal-foot { padding:12px 20px; text-align:right; border-top:1px solid #eee; }
</style>
<script src="js/supabase-client.js"></script>
</head>
<body>
<header>
  <h1>🌿 나무링크</h1>
  <span id="userLabel" style="font-size:14px;"></span>
</header>
<nav>
  <a href="children.html">아동 관리</a>
  <a href="records.html">치료 기록</a>
  <a href="calendar.html">아동 스케줄</a>
  <a href="payments.html">납부 관리</a>
  <a href="therapists.html">치료사 관리</a>
  <a href="#" onclick="logout()">로그아웃</a>
</nav>

<div class="profile-wrap">
  <div id="pHeader"></div>
  <div class="tabs">
    <div class="tab active" data-panel="basic">📋 기본정보</div>
    <div class="tab" data-panel="timeline">📅 치료 타임라인</div>
    <div class="tab" data-panel="docs">📁 문서 모음</div>
    <div class="tab" data-panel="memos">💬 학부모 욕구</div>
    <div class="tab" data-panel="services">🎯 서비스 현황</div>
  </div>

  <div id="panel-basic"    class="panel active"></div>
  <div id="panel-timeline" class="panel"></div>
  <div id="panel-docs"     class="panel"></div>
  <div id="panel-memos"    class="panel"></div>
  <div id="panel-services" class="panel"></div>
</div>

<!-- 공용 모달 -->
<div class="modal-bg" id="mBg">
  <div class="modal-box">
    <div class="modal-head">
      <span id="mTitle"></span>
      <button onclick="closeModal()" style="background:transparent;color:white;border:none;font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot" id="mFoot"></div>
  </div>
</div>

<script>
function logout(){ sessionStorage.clear(); location.href='index.html'; }
try { const u = sessionStorage.getItem('user'); if (u) document.getElementById('userLabel').textContent = u; } catch(e){}

function escapeHtml(s){ return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function loadArr(k){ try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(e){return[];} }
function saveArr(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function fmtDate(iso){ return iso ? new Date(iso).toLocaleDateString('ko-KR') : '-'; }
function normBirth8(b){
  const d = String(b||'').replace(/\D/g,'');
  if (d.length===8) return d;
  if (d.length===6) return (parseInt(d.slice(0,2),10) <= 30 ? '20' : '19') + d;
  return '';
}
function fmtBirth(b){
  const d = normBirth8(b);
  if (d.length !== 8) return b || '-';
  return `${d.slice(2,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
}
function calcMonths(b){
  const d = normBirth8(b);
  if (d.length !== 8) return null;
  const y=+d.slice(0,4), m=+d.slice(4,6), day=+d.slice(6,8);
  const now=new Date(), bd=new Date(y,m-1,day);
  if(isNaN(bd)) return null;
  let mo=(now.getFullYear()-bd.getFullYear())*12+(now.getMonth()-bd.getMonth());
  if(now.getDate()<bd.getDate()) mo--;
  return mo;
}

const params = new URLSearchParams(location.search);
const CHILD_ID = params.get('id');
if (!CHILD_ID) { document.body.innerHTML = '<div style="padding:60px;text-align:center;">잘못된 접근입니다. <a href="children.html">아동 관리로 돌아가기</a></div>'; }

const children = loadArr('children');
const child = children.find(c => c.id === CHILD_ID);
if (!child) { document.body.innerHTML = `<div style="padding:60px;text-align:center;">아동 정보를 찾을 수 없습니다. <a href="children.html">돌아가기</a></div>`; }

// 사이블링 통합: 동일 이름+생년월일이면 therapies 합침
const siblings = children.filter(c => c.name === child.name && c.birth === child.birth);
const allTherapies = siblings.flatMap(c => c.therapies || []);

// ===== 헤더 =====
function renderHeader() {
  const mo = calcMonths(child.birth);
  const st = child.status || '치료중';
  document.getElementById('pHeader').innerHTML = `
    <div class="p-head">
      <div>
        <h1>👶 ${escapeHtml(child.name)}</h1>
        <div class="sub">${fmtBirth(child.birth)}${mo?` · ${mo}개월`:''}${child.diagnosis?` · ${escapeHtml(child.diagnosis)}`:''}</div>
      </div>
      <div style="text-align:right;">
        <span class="status-pill st-${st}">${st}</span>
        <div style="font-size:11px;color:#666;margin-top:4px;">등록: ${fmtDate(child.createdAt)}</div>
      </div>
    </div>`;
}

// ===== 1. 기본정보 =====
function renderBasic() {
  const mo = calcMonths(child.birth);
  const therapistSet = new Set();
  const areaSet = new Set();
  const schedule = [];
  allTherapies.forEach(t => {
    if (t.therapist) therapistSet.add(t.therapist);
    if (t.support) areaSet.add(t.support);
    if (t.dayOfWeek || t.timeSlot) schedule.push(`${t.support||'-'} · ${t.dayOfWeek||'-'} ${t.timeSlot||''}`);
  });
  document.getElementById('panel-basic').innerHTML = `
    <div class="card">
      <h3>기본 정보</h3>
      <div class="info-grid">
        <div class="info-item"><label>이름</label><div class="v">${escapeHtml(child.name)}</div></div>
        <div class="info-item"><label>생년월일</label><div class="v">${fmtBirth(child.birth)}</div></div>
        <div class="info-item"><label>개월수</label><div class="v">${mo!=null?mo+'개월':'-'}</div></div>
        <div class="info-item"><label>진단명</label><div class="v">${escapeHtml(child.diagnosis)||'-'}</div></div>
        <div class="info-item"><label>등록일</label><div class="v">${fmtDate(child.createdAt)}</div></div>
        <div class="info-item"><label>보호자</label><div class="v">${escapeHtml(child.guardian)||'-'}</div></div>
        <div class="info-item"><label>연락처</label><div class="v">${escapeHtml(child.phone)||'-'}</div></div>
        <div class="info-item"><label>관리자번호</label><div class="v">${escapeHtml(child.managerId)||'-'}</div></div>
      </div>
      <div style="margin-top:14px;text-align:right;">
        <button class="btn btn-sub btn-small" onclick="editBasic()">✏️ 편집</button>
      </div>
    </div>
    <div class="card">
      <h3>담당 · 영역 · 시간표</h3>
      <div class="info-grid">
        <div class="info-item"><label>담당치료사</label><div class="v">${[...therapistSet].join(', ')||'-'}</div></div>
        <div class="info-item"><label>치료영역</label><div class="v">${[...areaSet].join(', ')||'-'}</div></div>
      </div>
      <table class="tbl" style="margin-top:12px;">
        <thead><tr><th>지원유형</th><th>담당치료사</th><th>수업요일</th><th>수업시간</th></tr></thead>
        <tbody>
          ${allTherapies.length ? allTherapies.map(t=>`
            <tr>
              <td>${escapeHtml(t.support||'-')}</td>
              <td>${escapeHtml(t.therapist||'-')}</td>
              <td>${escapeHtml(t.dayOfWeek||'-')}</td>
              <td>${escapeHtml(t.timeSlot||'-')}</td>
            </tr>`).join('') : '<tr><td colspan="4" class="empty">등록된 치료 정보가 없습니다.</td></tr>'}
        </tbody>
      </table>
    </div>`;
}

function editBasic() {
  showModal('기본 정보 편집', `
    <div class="fld"><label>진단명</label><input type="text" id="ebDiag" value="${escapeHtml(child.diagnosis)||''}"></div>
    <div class="fld"><label>보호자</label><input type="text" id="ebGuard" value="${escapeHtml(child.guardian)||''}"></div>
    <div class="fld"><label>연락처</label><input type="text" id="ebPhone" value="${escapeHtml(child.phone)||''}"></div>
  `, `<button class="btn btn-sub" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveBasic()">저장</button>`);
}
function saveBasic() {
  child.diagnosis = document.getElementById('ebDiag').value.trim();
  child.guardian = document.getElementById('ebGuard').value.trim();
  child.phone = document.getElementById('ebPhone').value.trim();
  const arr = loadArr('children');
  const i = arr.findIndex(c=>c.id===CHILD_ID);
  if (i>=0) { arr[i] = {...arr[i], ...child}; saveArr('children', arr); }
  closeModal(); renderHeader(); renderBasic();
}

// ===== 2. 치료 타임라인 =====
function tlKey() { return `child_timeline_${CHILD_ID}`; }
function renderTimeline() {
  const events = loadArr(tlKey()).sort((a,b) => (b.date||'').localeCompare(a.date||''));

  // 자동 이벤트: 등록일, 초기상담지 제출, 치료기록
  const auto = [];
  if (child.createdAt) auto.push({ date: child.createdAt.slice(0,10), title:'📌 아동 등록', desc:'신규아동에서 이관 등록됨', auto:true });
  const asses = loadArr('initial_assessments').filter(x=>x.child_id===CHILD_ID);
  asses.forEach(a => auto.push({ date: (a.submitted_at||'').slice(0,10), title:'📝 초기상담지 제출', desc:`연령대: ${a.age_group}`, auto:true }));
  const recs = loadArr('records').filter(r=>r.childId===CHILD_ID || r.child_id===CHILD_ID);
  recs.forEach(r => auto.push({ date: r.date || r.month || '', title:'📋 치료 기록 작성', desc: r.support||r.category||'', auto:true }));

  const merged = [...events, ...auto].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  document.getElementById('panel-timeline').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">치료 타임라인 (${merged.length})</h3>
        <button class="add-btn" onclick="addTimelineEvent()">+ 이벤트 추가</button>
      </div>
      ${merged.length ? `<ul class="timeline">${merged.map((e,i)=>`
        <li>
          <div class="date">${e.date||'-'}${e.auto?' <span style="color:#aaa;">(자동)</span>':''}</div>
          <div class="title">${escapeHtml(e.title)}</div>
          ${e.desc?`<div class="desc">${escapeHtml(e.desc)}</div>`:''}
          ${!e.auto?`<button class="btn btn-danger btn-small" style="margin-top:4px;" onclick="delTimelineEvent(${events.indexOf(e)})">삭제</button>`:''}
        </li>`).join('')}</ul>` : '<div class="empty">등록된 이벤트가 없습니다.</div>'}
    </div>`;
}
function addTimelineEvent() {
  const today = new Date().toISOString().slice(0,10);
  showModal('타임라인 이벤트 추가', `
    <div class="fld"><label>날짜 *</label><input type="date" id="tlDate" value="${today}"></div>
    <div class="fld"><label>제목 *</label><input type="text" id="tlTitle" placeholder="예: 재평가 실시"></div>
    <div class="fld"><label>내용</label><textarea id="tlDesc" placeholder="상세 내용"></textarea></div>
  `, `<button class="btn btn-sub" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTimelineEvent()">저장</button>`);
}
function saveTimelineEvent() {
  const date = document.getElementById('tlDate').value;
  const title = document.getElementById('tlTitle').value.trim();
  const desc = document.getElementById('tlDesc').value.trim();
  if (!date || !title) return alert('날짜와 제목은 필수입니다.');
  const arr = loadArr(tlKey());
  arr.push({ date, title, desc, createdAt: new Date().toISOString() });
  saveArr(tlKey(), arr);
  closeModal(); renderTimeline();
}
function delTimelineEvent(i) {
  if (!confirm('이 이벤트를 삭제하시겠습니까?')) return;
  const arr = loadArr(tlKey());
  arr.splice(i,1);
  saveArr(tlKey(), arr);
  renderTimeline();
}

// ===== 3. 문서 모음 =====
function docsKey() { return `child_docs_${CHILD_ID}`; }
function renderDocs() {
  const docs = loadArr(docsKey());
  const asses = loadArr('initial_assessments').filter(x=>x.child_id===CHILD_ID);
  const recs = loadArr('records').filter(r=>r.childId===CHILD_ID || r.child_id===CHILD_ID);
  const groupByCat = { external:[], internal:[] };
  docs.forEach(d => groupByCat[d.category||'external'].push(d));

  document.getElementById('panel-docs').innerHTML = `
    <div class="card">
      <h3>📝 초기상담지 응답 (${asses.length})</h3>
      ${asses.length ? asses.map(a => `
        <div style="padding:10px;border:1px solid #e0e0e0;border-radius:6px;margin-bottom:8px;">
          <div style="font-size:11px;color:#888;">${fmtDate(a.submitted_at)} · 연령대 ${a.age_group}</div>
          <div style="font-size:13px;margin-top:4px;"><b>주 호소:</b> ${escapeHtml(a.main_concern)||'-'}</div>
          <div style="font-size:12px;margin-top:4px;color:#666;">상담자: ${escapeHtml(a.counselor_name)||'-'} · 연락처: ${escapeHtml(a.contact)||'-'}</div>
          <button class="btn btn-sub btn-small" style="margin-top:6px;" onclick="viewAssessment('${a.id}')">전체보기</button>
        </div>`).join('') : '<div class="empty">제출된 상담지가 없습니다.</div>'}
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;">🏥 타기관 평가보고서 (${groupByCat.external.length})</h3>
        <button class="add-btn" onclick="addDoc('external')">+ 파일 첨부</button>
      </div>
      <div style="margin-top:10px;">
        ${groupByCat.external.length ? groupByCat.external.map((d,i)=>_renderDocRow(d,docs.indexOf(d))).join('') : '<div class="empty">첨부된 문서가 없습니다.</div>'}
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;">🌿 자라는나무 평가보고서 (${groupByCat.internal.length})</h3>
        <button class="add-btn" onclick="addDoc('internal')">+ 파일 첨부</button>
      </div>
      <div style="margin-top:10px;">
        ${groupByCat.internal.length ? groupByCat.internal.map((d,i)=>_renderDocRow(d,docs.indexOf(d))).join('') : '<div class="empty">첨부된 문서가 없습니다.</div>'}
      </div>
    </div>

    <div class="card">
      <h3>📋 치료 기록지 (${recs.length})</h3>
      ${recs.length ? `<table class="tbl">
        <thead><tr><th>날짜</th><th>영역</th><th>회기</th></tr></thead>
        <tbody>${recs.slice(0,20).map(r=>`
          <tr><td>${escapeHtml(r.date||r.month||'-')}</td><td>${escapeHtml(r.support||r.category||'-')}</td><td>${escapeHtml(r.sessionNo||r.round||'-')}</td></tr>
        `).join('')}</tbody></table>` : '<div class="empty">등록된 치료 기록이 없습니다.</div>'}
      <div style="margin-top:10px;text-align:right;">
        <a href="records.html"><button class="btn btn-sub btn-small">치료 기록으로 이동 →</button></a>
      </div>
    </div>`;
}
function _renderDocRow(d, idx) {
  return `<div class="doc-row">
    <div class="doc-info">
      <div class="fname">📎 ${escapeHtml(d.title||d.filename||'문서')}</div>
      <div class="meta">${fmtDate(d.uploadedAt)} · ${d.filename?escapeHtml(d.filename):''} ${d.size?`· ${Math.round(d.size/1024)} KB`:''}</div>
      ${d.note?`<div style="font-size:12px;margin-top:4px;color:#555;">${escapeHtml(d.note)}</div>`:''}
    </div>
    <div style="display:flex;gap:4px;">
      ${d.dataUrl?`<button class="btn btn-sub btn-small" onclick="_openDoc(${idx})">열기</button>`:''}
      <button class="btn btn-danger btn-small" onclick="_delDoc(${idx})">삭제</button>
    </div>
  </div>`;
}
function _openDoc(idx) {
  const d = loadArr(docsKey())[idx];
  if (!d || !d.dataUrl) return alert('파일 데이터가 없습니다.');
  const w = window.open('');
  if (d.filename && /\.(pdf|jpg|jpeg|png|gif|webp)$/i.test(d.filename)) {
    w.document.write(`<title>${escapeHtml(d.filename)}</title><body style="margin:0;"><embed src="${d.dataUrl}" style="width:100vw;height:100vh;">`);
  } else {
    const a = document.createElement('a'); a.href = d.dataUrl; a.download = d.filename||'file'; a.click();
    w.close();
  }
}
function _delDoc(idx) {
  if (!confirm('문서를 삭제하시겠습니까?')) return;
  const arr = loadArr(docsKey()); arr.splice(idx,1); saveArr(docsKey(), arr); renderDocs();
}
function addDoc(category) {
  showModal(category==='external'?'타기관 평가보고서 첨부':'자라는나무 평가보고서 첨부', `
    <div class="fld"><label>제목</label><input type="text" id="dTitle" placeholder="예: 아산병원 발달평가"></div>
    <div class="fld"><label>파일 (PDF·이미지 권장, 5MB 이하)</label><input type="file" id="dFile" accept=".pdf,image/*"></div>
    <div class="fld"><label>메모</label><textarea id="dNote" placeholder="비고"></textarea></div>
  `, `<button class="btn btn-sub" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveDoc('${category}')">저장</button>`);
}
function saveDoc(category) {
  const title = document.getElementById('dTitle').value.trim();
  const file = document.getElementById('dFile').files[0];
  const note = document.getElementById('dNote').value.trim();
  if (!title && !file) return alert('제목 또는 파일이 필요합니다.');
  const rec = { category, title, note, uploadedAt: new Date().toISOString() };
  if (file) {
    if (file.size > 5*1024*1024) return alert('파일 크기가 5MB 를 초과합니다.\nlocalStorage 용량 제한 때문에 저장이 어렵습니다.');
    const reader = new FileReader();
    reader.onload = () => {
      rec.filename = file.name; rec.size = file.size; rec.dataUrl = reader.result;
      const arr = loadArr(docsKey()); arr.push(rec); saveArr(docsKey(), arr);
      closeModal(); renderDocs();
    };
    reader.readAsDataURL(file);
  } else {
    const arr = loadArr(docsKey()); arr.push(rec); saveArr(docsKey(), arr);
    closeModal(); renderDocs();
  }
}
function viewAssessment(id) {
  const a = loadArr('initial_assessments').find(x=>x.id===id);
  if (!a) return;
  const domains = {social_emotional:'사회·정서', language:'언어', cognitive:'인지', motor:'운동'};
  let body = `<div style="font-size:11px;color:#888;">${fmtDate(a.submitted_at)} · 연령대 ${a.age_group}</div>
    <div style="margin-top:8px;font-size:13px;"><b>주 호소:</b> ${escapeHtml(a.main_concern)||'-'}</div>`;
  Object.keys(domains).forEach(dk => {
    const resp = a['responses_'+dk] || {};
    const keys = Object.keys(resp);
    if (!keys.length) return;
    body += `<div style="margin-top:10px;"><b style="color:#558b2f;">${domains[dk]}</b><ul style="margin:4px 0 0 20px;font-size:12px;">`;
    keys.forEach(k => body += `<li>${k}: <b>${escapeHtml(resp[k])}</b></li>`);
    body += '</ul></div>';
  });
  if (a.regression_note)  body += `<div style="margin-top:8px;font-size:12px;"><b>퇴행:</b> ${escapeHtml(a.regression_note)}</div>`;
  if (a.prior_evaluation) body += `<div style="font-size:12px;"><b>이전 평가:</b> ${escapeHtml(a.prior_evaluation)}</div>`;
  if (a.daycare_status)   body += `<div style="font-size:12px;"><b>어린이집:</b> ${escapeHtml(a.daycare_status)}</div>`;
  if (a.family_history)   body += `<div style="font-size:12px;"><b>가족력:</b> ${escapeHtml(a.family_history)}</div>`;
  if (a.summary_memo)     body += `<div style="font-size:12px;"><b>메모:</b> ${escapeHtml(a.summary_memo)}</div>`;
  showModal('초기상담지 응답', body, `<button class="btn btn-sub" onclick="closeModal()">닫기</button>`);
}

// ===== 4. 학부모 욕구 메모 =====
function memoKey() { return `child_parent_memos_${CHILD_ID}`; }
function renderMemos() {
  const arr = loadArr(memoKey()).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  document.getElementById('panel-memos').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;">학부모 욕구 메모 (${arr.length})</h3>
        <button class="add-btn" onclick="addMemo()">+ 메모 추가</button>
      </div>
      ${arr.length ? arr.map((m,i) => `
        <div class="memo-row">
          <div class="memo-date">${m.date||'-'}</div>
          <div class="memo-content">${escapeHtml(m.content)}</div>
          <div class="memo-chk">
            <label style="font-size:12px;cursor:pointer;">
              <input type="checkbox" ${m.reflected?'checked':''} onchange="toggleReflect(${loadArr(memoKey()).indexOf(m)})">
              ${m.reflected?'✅ 반영됨':'반영 대기'}
            </label>
            <button class="btn btn-danger btn-small" style="margin-left:8px;" onclick="delMemo(${loadArr(memoKey()).indexOf(m)})">삭제</button>
          </div>
        </div>`).join('') : '<div class="empty">등록된 학부모 욕구가 없습니다.</div>'}
    </div>`;
}
function addMemo() {
  const today = new Date().toISOString().slice(0,10);
  showModal('학부모 욕구 메모 추가', `
    <div class="fld"><label>날짜 *</label><input type="date" id="mDate" value="${today}"></div>
    <div class="fld"><label>내용 *</label><textarea id="mContent" placeholder="예: 자기표현 향상 요청" style="min-height:100px;"></textarea></div>
  `, `<button class="btn btn-sub" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveMemo()">저장</button>`);
}
function saveMemo() {
  const date = document.getElementById('mDate').value;
  const content = document.getElementById('mContent').value.trim();
  if (!date || !content) return alert('날짜와 내용은 필수입니다.');
  const arr = loadArr(memoKey());
  arr.push({ date, content, reflected:false, createdAt: new Date().toISOString() });
  saveArr(memoKey(), arr);
  closeModal(); renderMemos();
}
function toggleReflect(i) {
  const arr = loadArr(memoKey());
  if (!arr[i]) return;
  arr[i].reflected = !arr[i].reflected;
  saveArr(memoKey(), arr);
  renderMemos();
}
function delMemo(i) {
  if (!confirm('이 메모를 삭제하시겠습니까?')) return;
  const arr = loadArr(memoKey()); arr.splice(i,1); saveArr(memoKey(), arr); renderMemos();
}

// ===== 5. 서비스 현황 =====
function renderServices() {
  const active = allTherapies.filter(t => {
    const now = new Date().toISOString().slice(0,7);
    if (t.serviceStartDate && t.serviceStartDate.slice(0,7) > now) return false;
    if (t.centerEndDate && t.centerEndDate.slice(0,7) < now) return false;
    if (t.banchiEndDate && t.banchiEndDate.slice(0,7) < now) return false;
    return true;
  });
  document.getElementById('panel-services').innerHTML = `
    <div class="card">
      <h3>현재 제공 서비스 (${active.length})</h3>
      ${active.length ? `<table class="tbl">
        <thead><tr><th>지원유형</th><th>담당치료사</th><th>수업요일</th><th>수업시간</th><th>본인부담금</th><th>개시일</th></tr></thead>
        <tbody>${active.map(t=>`
          <tr>
            <td>${escapeHtml(t.support||'-')}</td>
            <td>${escapeHtml(t.therapist||'-')}</td>
            <td>${escapeHtml(t.dayOfWeek||'-')}</td>
            <td>${escapeHtml(t.timeSlot||'-')}</td>
            <td>${escapeHtml(t.feeType||'-')} ${t.selfPay?`${t.selfPay.toLocaleString()}원`:''}</td>
            <td>${escapeHtml(t.serviceStartDate||'-')}</td>
          </tr>`).join('')}</tbody></table>` : '<div class="empty">현재 제공중인 서비스가 없습니다.</div>'}
    </div>
    <div class="card">
      <h3>전체 서비스 이력 (${allTherapies.length})</h3>
      ${allTherapies.length ? `<table class="tbl">
        <thead><tr><th>지원유형</th><th>담당치료사</th><th>개시일</th><th>종결일</th><th>상태</th></tr></thead>
        <tbody>${allTherapies.map(t=>{
          const now = new Date().toISOString().slice(0,7);
          const endDate = t.centerEndDate || t.banchiEndDate || '';
          const isEnded = endDate && endDate.slice(0,7) < now;
          const isNotStarted = t.serviceStartDate && t.serviceStartDate.slice(0,7) > now;
          const st = isEnded ? '종결' : (isNotStarted ? '대기' : '진행중');
          return `<tr>
            <td>${escapeHtml(t.support||'-')}</td>
            <td>${escapeHtml(t.therapist||'-')}</td>
            <td>${escapeHtml(t.serviceStartDate||'-')}</td>
            <td>${escapeHtml(endDate||'-')}</td>
            <td><span class="status-pill st-${st==='진행중'?'치료중':(st==='종결'?'종결':'대기중')}">${st}</span></td>
          </tr>`;
        }).join('')}</tbody></table>` : '<div class="empty">등록된 이력이 없습니다.</div>'}
    </div>`;
}

// ===== 탭 전환 =====
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-'+t.dataset.panel).classList.add('active');
  });
});

// ===== 모달 =====
function showModal(title, body, foot) {
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').innerHTML = body;
  document.getElementById('mFoot').innerHTML = foot || '';
  document.getElementById('mBg').classList.add('show');
}
function closeModal() { document.getElementById('mBg').classList.remove('show'); }

// ===== 초기 렌더 =====
renderHeader();
renderBasic();
renderTimeline();
renderDocs();
renderMemos();
renderServices();
</script>

  window._supaLiveKeys = ['children','payments','records','therapists','intake_list','assessment_tokens','initial_assessments','voucher_data'];
  window._supaLiveOnLoad = () => {
    try { renderHeader(); renderBasic(); renderTimeline(); renderDocs(); renderMemos(); renderServices(); } catch(e) {}
  };
</script>
