<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경 - 나무링크</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .box { background:white; border-radius:12px; padding:32px 40px; width:420px; box-shadow:0 4px 16px rgba(0,0,0,.12); }
    .box h1 { color:#2e7d32; font-size:22px; margin:0 0 6px; text-align:center; }
    .box .sub { color:#888; font-size:13px; text-align:center; margin-bottom:20px; }
    .banner { padding:12px; background:#fff3e0; border:1px solid #ffb74d; border-radius:8px; margin-bottom:18px; font-size:13px; color:#e65100; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:12px; font-weight:bold; color:#555; margin-bottom:5px; }
    .form-group input { width:100%; padding:9px 11px; border:1px solid #ccc; border-radius:6px; font-size:14px; box-sizing:border-box; }
    .form-group .hint { font-size:11px; color:#888; margin-top:4px; }
    .btn { width:100%; padding:12px; font-size:15px; font-weight:bold; border:none; border-radius:6px; cursor:pointer; }
    .btn-primary { background:#2e7d32; color:white; }
    .btn-secondary { background:#e0e0e0; color:#333; margin-top:8px; }
    .err { color:#c62828; font-size:13px; margin-top:8px; min-height:18px; }
    .ok { color:#2e7d32; font-size:13px; margin-top:8px; min-height:18px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🔐 비밀번호 변경</h1>
    <p class="sub" id="userLabel"></p>

    <div id="firstBanner" class="banner" style="display:none;">
      🎉 첫 로그인을 환영합니다!<br>보안을 위해 <b>초기 비밀번호를 변경</b>해 주세요.
    </div>

    <div class="form-group">
      <label>현재 비밀번호</label>
      <input type="password" id="curPw" placeholder="현재 비밀번호">
      <p class="hint">첫 로그인이면 초기 비밀번호 (생년월일 MMDD)</p>
    </div>

    <div class="form-group">
      <label>새 비밀번호</label>
      <input type="password" id="newPw" placeholder="4자 이상">
    </div>

    <div class="form-group">
      <label>새 비밀번호 확인</label>
      <input type="password" id="newPw2" placeholder="위와 동일하게 입력" onkeydown="if(event.key==='Enter')doChange()">
    </div>

    <div id="msg" class="err"></div>

    <button class="btn btn-primary" onclick="doChange()">변경하기</button>
    <button class="btn btn-secondary" onclick="cancel()" id="cancelBtn">나중에 변경 (건너뛰기)</button>
  </div>

  <script>
    const isFirst = new URLSearchParams(location.search).get('first') === '1';
    if (!localStorage.getItem('currentUser')) location.href = 'index.html';
    const role = localStorage.getItem('currentUserRole');
    if (role !== 'therapist' && role !== 'staff') {
      alert('치료사·행정직원 계정만 접근 가능합니다.');
      location.href = 'children.html';
    }
    document.getElementById('userLabel').textContent = (localStorage.getItem('currentUser')||'') + '님';
    if (isFirst) {
      document.getElementById('firstBanner').style.display = 'block';
      document.getElementById('cancelBtn').textContent = '나중에 변경 (경고: 다음 로그인 시 다시 안내됩니다)';
    }

    async function doChange() {
      const cur = document.getElementById('curPw').value;
      const n1 = document.getElementById('newPw').value;
      const n2 = document.getElementById('newPw2').value;
      const msg = document.getElementById('msg');
      msg.className = 'err'; msg.textContent = '';

      if (!cur) { msg.textContent = '현재 비밀번호를 입력하세요.'; return; }
      if (!n1 || n1.length < 4) { msg.textContent = '새 비밀번호는 4자 이상이어야 합니다.'; return; }
      if (n1 !== n2) { msg.textContent = '새 비밀번호가 일치하지 않습니다.'; return; }
      if (cur === n1) { msg.textContent = '현재 비밀번호와 다른 값을 사용하세요.'; return; }

      const kind = role === 'staff' ? 'staff' : 'therapist';
      const accountId = role === 'staff'
        ? localStorage.getItem('currentStaffId')
        : localStorage.getItem('currentTherapistId');
      try {
        await window.NamuAuth.changePassword(kind, accountId, cur, n1);
        msg.className = 'ok'; msg.textContent = '✅ 변경 완료. 이동합니다...';
        setTimeout(() => location.href = 'children.html', 800);
      } catch (e) {
        msg.className = 'err'; msg.textContent = '❌ ' + (e.message || e);
      }
    }

    function cancel() {
      if (isFirst && !confirm('첫 로그인 시 비밀번호 변경을 권장합니다.\n정말 건너뛸까요?')) return;
      location.href = 'children.html';
    }
  </script>
</body>
</html>
